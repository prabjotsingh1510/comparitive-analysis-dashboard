<style>

      --wash: rgba(255,255,255,0.05);
    }
  }
  :root[data-theme="dark"] {
    color-scheme: dark;
    --surface-1: #1a1a19; --plane: #0d0d0d;
    --ink-1: #ffffff; --ink-2: #c3c2b7; --ink-3: #898781;
    --grid: #2c2c2a; --axis: #383835; --border: rgba(255,255,255,0.10);
    --s1: #3987e5; --s2: #199e70;
    --pos: #3987e5; --neg: #e66767;
    --wash: rgba(255,255,255,0.05);

  * { box-sizing: border-box; }
  body {

  .wrap { max-width: 1180px; margin: 0 auto; padding: 0 20px 80px; }

  .sub { color: var(--ink-2); font-size: 13.5px; margin: 0 0 16px; }
  nav { display: flex; gap: 2px; flex-wrap: wrap; }
  nav button {

    padding: 9px 14px; font: inherit; font-size: 13.5px; font-weight: 500;

  nav button:hover { color: var(--ink-1); background: var(--wash); }
  nav button[aria-selected="true"] { color: var(--s1); border-bottom-color: var(--s1); font-weight: 600; }

  section[role="tabpanel"] { padding-top: 26px; }
  section[hidden] { display: none; }
  h2 { font-size: 17px; margin: 34px 0 3px; letter-spacing: -0.01em; }
  h2:first-of-type { margin-top: 6px; }
  .note { color: var(--ink-2); font-size: 13px; margin: 0 0 14px; max-width: 78ch; }
  .card { background: var(--surface-1); border: 1px solid var(--border); border-radius: 10px; padding: 16px; }

  /* KPI */
  .kpis { display: grid; grid-template-columns: repeat(auto-fit, minmax(215px, 1fr)); gap: 12px; }
  .kpi { background: var(--surface-1); border: 1px solid var(--border); border-radius: 10px; padding: 14px 15px; }
  .kpi h3 { margin: 0 0 10px; font-size: 11.5px; font-weight: 600; letter-spacing: .05em;
            text-transform: uppercase; color: var(--ink-3); }
  .kpi-row { display: flex; justify-content: space-between; align-items: baseline; gap: 8px; padding: 3px 0; }
  .kpi-lab { font-size: 12px; color: var(--ink-2); }
  .kpi-val { font-size: 17px; font-weight: 600; letter-spacing: -0.01em; }
  .kpi-val.sm { font-size: 13px; font-weight: 500; color: var(--ink-2); }
  .kpi-d { margin-top: 9px; padding-top: 9px; border-top: 1px solid var(--border);
           display: flex; justify-content: space-between; align-items: baseline; font-size: 12.5px; }
  .up { color: var(--good); font-weight: 600; } .down { color: var(--crit); font-weight: 600; }
  .flat { color: var(--ink-2); font-weight: 600; }

  /* quadrant cards */
  .quad { background: var(--surface-1); border: 1px solid var(--border); border-radius: 10px;
          padding: 14px; border-left: 3px solid var(--qc); }
  .quad .qh { display: flex; align-items: center; gap: 7px; font-weight: 600; font-size: 13.5px; margin-bottom: 2px; }
  .qdot { width: 9px; height: 9px; border-radius: 2px; background: var(--qc); flex: none; }
  .quad .qd { font-size: 12px; color: var(--ink-2); margin-bottom: 11px; min-height: 32px; }
  .qgrid { display: grid; grid-template-columns: 1fr 1fr; gap: 7px 10px; font-size: 12px; }
  .qgrid b { display: block; font-size: 15px; font-weight: 600; }
  .qgrid span { color: var(--ink-3); font-size: 11px; }

  /* tables */
  .tw { overflow-x: auto; border: 1px solid var(--border); border-radius: 10px; background: var(--surface-1); }
  table { border-collapse: collapse; width: 100%; font-size: 13px; }
  th, td { padding: 8px 11px; text-align: right; white-space: nowrap; border-bottom: 1px solid var(--grid); }
  th:first-child, td:first-child { text-align: left; position: sticky; left: 0; background: var(--surface-1); }
  th { font-size: 11px; font-weight: 600; letter-spacing: .04em; text-transform: uppercase;
       color: var(--ink-3); background: var(--surface-1); position: sticky; top: 0; z-index: 1; }
  th.s { cursor: pointer; user-select: none; }
  th.s:hover { color: var(--ink-1); }
  th:first-child { z-index: 2; }
  tbody tr:hover td { background: var(--wash); }
  tbody tr:last-child td { border-bottom: 0; }
  td.n { font-variant-numeric: tabular-nums; }
  .tag { display: inline-flex; align-items: center; gap: 5px; font-size: 11px; font-weight: 600;

  .tag::before { content: ""; width: 6px; height: 6px; border-radius: 50%; background: var(--tc); }
  .mono { font-variant-numeric: tabular-nums; }
  .muted { color: var(--ink-3); }

  /* controls */

  .seg { display: inline-flex; border: 1px solid var(--border); border-radius: 7px; overflow: hidden; }

  .prob p { margin: 0; font-size: 12.5px; color: var(--ink-2); }
  .prob b { color: var(--ink-1); font-variant-numeric: tabular-nums; }

  .stat .s { font-size: 11.5px; color: var(--ink-2); margin-top: 6px; }

  .chart { background: var(--surface-1); border: 1px solid var(--border); border-radius: 10px;

  .tip { position: fixed; pointer-events: none; z-index: 99; background: var(--surface-1);

  .tip div { color: var(--ink-2); font-variant-numeric: tabular-nums; }
  .grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }

/* ---------- formatting ---------- */
const nf = new Intl.NumberFormat('en-IN', {maximumFractionDigits:0});
const R  = v => (v<0?'-':'') + '₹' + nf.format(Math.abs(Math.round(v)));
const Rs = v => { const a=Math.abs(v); const s=v<0?'-':'';
  if (a>=1e7) return s+'₹'+(a/1e7).toFixed(2)+' Cr';
  if (a>=1e5) return s+'₹'+(a/1e5).toFixed(2)+' L';
  if (a>=1e3) return s+'₹'+(a/1e3).toFixed(1)+'k';
  return s+'₹'+Math.round(a); };
const P  = v => (v==null? '—' : v.toFixed(1)+'%');
const esc = s => String(s).replace(/[&<>"]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
const QC = {star:'var(--good)', overhead:'var(--warn)', loss:'var(--crit)'};
const QN = {star:'Star', overhead:'Overhead-heavy', loss:'Loss-making'};

/* ---------- tooltip ---------- */
const tip = document.getElementById('tip');
function showTip(e, html){ tip.innerHTML = html; tip.style.opacity = 1;
  const r = tip.getBoundingClientRect();
  let x = e.clientX + 14, y = e.clientY + 14;
  if (x + r.width > innerWidth - 8) x = e.clientX - r.width - 14;
  if (y + r.height > innerHeight - 8) y = e.clientY - r.height - 14;
  tip.style.left = x + 'px'; tip.style.top = y + 'px';
}
const hideTip = () => tip.style.opacity = 0;
function bind(el, html){
  el.addEventListener('mousemove', e => showTip(e, html));
  el.addEventListener('mouseleave', hideTip);
}

/* ---------- svg helpers ---------- */
const NS = 'http://www.w3.org/2000/svg';
function el(n, a={}){ const x = document.createElementNS(NS, n);
  for (const k in a) x.setAttribute(k, a[k]); return x; }
function txt(x, y, s, a={}){ const t = el('text', Object.assign({x, y, fill:'var(--ink-2)',
  'font-size':11, 'font-family':'system-ui, sans-serif'}, a)); t.textContent = s; return t; }
/* rounded rect with 4px radius on the value end only, anchored to baseline */
function bar(x, y, w, h, r, side){
  r = Math.min(r, w/2, h/2);
  if (h <= 0.5 || r <= 0) return el('rect', {x, y, width:Math.max(w,0), height:Math.max(h,0.5)});
  let d;
  if (side === 'top')    d = `M${x},${y+h} L${x},${y+r} Q${x},${y} ${x+r},${y} L${x+w-r},${y} Q${x+w},${y} ${x+w},${y+r} L${x+w},${y+h} Z`;
  else if (side==='bot') d = `M${x},${y} L${x},${y+h-r} Q${x},${y+h} ${x+r},${y+h} L${x+w-r},${y+h} Q${x+w},${y+h} ${x+w},${y+h-r} L${x+w},${y} Z`;
  else if (side==='right')d= `M${x},${y} L${x+w-r},${y} Q${x+w},${y} ${x+w},${y+r} L${x+w},${y+h-r} Q${x+w},${y+h} ${x+w-r},${y+h} L${x},${y+h} Z`;
  else                   d = `M${x+w},${y} L${x+r},${y} Q${x},${y} ${x},${y+r} L${x},${y+h-r} Q${x},${y+h} ${x+r},${y+h} L${x+w},${y+h} Z`;
  return el('path', {d});
}
function ticks(lo, hi, n=5){
  const raw=(hi-lo)/n, mag=Math.pow(10,Math.floor(Math.log10(Math.abs(raw)||1)));
  const st=[1,2,2.5,5,10].map(m=>m*mag).find(s=>s>=raw)||mag*10;
  const out=[]; for(let v=Math.ceil(lo/st)*st; v<=hi+1e-9; v+=st) out.push(+v.toFixed(6));
  return out;
}

/* =======================================================================
   SECTION 1 — PERIOD COMPARISON
   ======================================================================= */
/* dfmt: separate formatter for the delta — percentage-valued KPIs must show a
   percentage-POINT change ("pp"), never "%", which would read as a relative move. */
function kpi(title, jv, av, fmt, jSub, aSub, betterUp=true, dfmt=null){
  const d = av - jv, pct = jv !== 0 ? d/Math.abs(jv)*100 : null;
  const df = dfmt || fmt;
  const cls = Math.abs(d) < 1e-9 ? 'flat' : (betterUp ? (d>0?'up':'down') : (d<0?'up':'down'));
  return `<div class="kpi"><h3>${title}</h3>
    <div class="kpi-row"><span class="kpi-lab">Jan–Mar</span><span class="kpi-val">${fmt(jv)}</span></div>
    ${jSub?`<div class="kpi-row"><span class="kpi-lab"></span><span class="kpi-val sm">${jSub}</span></div>`:''}
    <div class="kpi-row"><span class="kpi-lab">Apr–Jun</span><span class="kpi-val">${fmt(av)}</span></div>
    ${aSub?`<div class="kpi-row"><span class="kpi-lab"></span><span class="kpi-val sm">${aSub}</span></div>`:''}
    <div class="kpi-d"><span class="kpi-lab">Change</span>
      <span class="${cls}">${d>0?'+':''}${df(d)}${pct!=null?` · ${d>0?'+':''}${pct.toFixed(1)}%`:''}</span></div>
  </div>`;
}

/* grouped bar: CM2% & EBITDA% by period */
function chartPct(){
  const W=620, H=290, m={t:22,r:16,b:40,l:52};
  const iw=W-m.l-m.r, ih=H-m.t-m.b;
  const groups=[{n:'CM2 %', j:D.periods.jan.tot.cm2pct, a:D.periods.apr.tot.cm2pct},
                {n:'EBITDA %', j:D.periods.jan.tot.ebitdapct, a:D.periods.apr.tot.ebitdapct}];
  const vals=groups.flatMap(g=>[g.j,g.a]);
  const lo=Math.min(0,...vals)*1.12, hi=Math.max(0,...vals,5);
  const y=v=>m.t+ih-(v-lo)/(hi-lo)*ih;
  const s=el('svg',{viewBox:`0 0 ${W} ${H}`,role:'img','aria-label':'CM2% and EBITDA% by period'});
  for(const t of ticks(lo,hi,5)){
    s.appendChild(el('line',{x1:m.l,x2:m.l+iw,y1:y(t),y2:y(t),stroke:'var(--grid)','stroke-width':1}));
    s.appendChild(txt(m.l-8,y(t)+4,t.toFixed(0)+'%',{'text-anchor':'end',fill:'var(--ink-3)'}));
  }
  s.appendChild(el('line',{x1:m.l,x2:m.l+iw,y1:y(0),y2:y(0),stroke:'var(--axis)','stroke-width':1.5}));
  const gw=iw/groups.length;
  groups.forEach((g,i)=>{
    const cx=m.l+gw*i+gw/2, bw=52;
    [['Jan–Mar',g.j,'var(--s1)',-1],['Apr–Jun',g.a,'var(--s2)',1]].forEach(([nm,v,c,dir])=>{
      const bx=cx+(dir<0?-bw-2:2), top=Math.min(y(v),y(0)), h=Math.abs(y(v)-y(0));
      const b=bar(bx,top,bw,h,4,v>=0?'top':'bot'); b.setAttribute('fill',c);
      bind(b,`<b>${nm} · ${g.n}</b><div>${v.toFixed(1)}% of net revenue</div>`);
      s.appendChild(b);
      s.appendChild(txt(bx+bw/2,(v>=0?top-6:top+h+14),v.toFixed(1)+'%',
        {'text-anchor':'middle','font-weight':600,'font-size':11.5,fill:'var(--ink-1)'}));
    });
    s.appendChild(txt(cx,H-14,g.n,{'text-anchor':'middle','font-weight':600,'font-size':12.5,fill:'var(--ink-1)'}));
  });
  return s;
}

/* scatter: X=CM2%, Y=EBITDA%, size=Revenue */
const CLX=[-250,100], CLY=[-300,100];
function chartScatter(pk){
  const W=620,H=430,m={t:16,r:16,b:44,l:52};
  const iw=W-m.l-m.r, ih=H-m.t-m.b;
  const x=v=>m.l+(Math.max(CLX[0],Math.min(CLX[1],v))-CLX[0])/(CLX[1]-CLX[0])*iw;
  const y=v=>m.t+ih-(Math.max(CLY[0],Math.min(CLY[1],v))-CLY[0])/(CLY[1]-CLY[0])*ih;
  const ps=D.periods[pk].products;
  const rmax=Math.max(...ps.map(p=>p.rev));
  const rad=v=>4+Math.sqrt(v/rmax)*22;
  const s=el('svg',{viewBox:`0 0 ${W} ${H}`,role:'img','aria-label':'CM2% vs EBITDA% by product'});
  // quadrant shading
  const x0=x(0), y0=y(0);
  s.appendChild(el('rect',{x:x0,y:m.t,width:m.l+iw-x0,height:y0-m.t,fill:'var(--good)','fill-opacity':.07}));
  s.appendChild(el('rect',{x:x0,y:y0,width:m.l+iw-x0,height:m.t+ih-y0,fill:'var(--warn)','fill-opacity':.09}));
  s.appendChild(el('rect',{x:m.l,y:y0,width:x0-m.l,height:m.t+ih-y0,fill:'var(--crit)','fill-opacity':.07}));
  for(const t of ticks(CLY[0],CLY[1],5)){
    s.appendChild(el('line',{x1:m.l,x2:m.l+iw,y1:y(t),y2:y(t),stroke:'var(--grid)','stroke-width':1}));
    s.appendChild(txt(m.l-8,y(t)+4,t+'%',{'text-anchor':'end',fill:'var(--ink-3)'}));
  }
  for(const t of ticks(CLX[0],CLX[1],5))
    s.appendChild(txt(x(t),m.t+ih+18,t+'%',{'text-anchor':'middle',fill:'var(--ink-3)'}));
  s.appendChild(el('line',{x1:x0,x2:x0,y1:m.t,y2:m.t+ih,stroke:'var(--axis)','stroke-width':1.5}));
  s.appendChild(el('line',{x1:m.l,x2:m.l+iw,y1:y0,y2:y0,stroke:'var(--axis)','stroke-width':1.5}));
  s.appendChild(txt(m.l+iw/2,H-6,'CM2 % of net revenue →',{'text-anchor':'middle','font-size':11.5,fill:'var(--ink-2)'}));
  s.appendChild(txt(-(m.t+ih/2),13,'← EBITDA % of net revenue',{'text-anchor':'middle','font-size':11.5,
    fill:'var(--ink-2)',transform:'rotate(-90)'}));
  s.appendChild(txt(x0+8,m.t+14,'STARS  CM2+ / EBITDA+',{'font-size':10,'font-weight':600,fill:'var(--good)'}));
  s.appendChild(txt(m.l+iw-6,m.t+ih-6,'OVERHEAD-HEAVY  CM2+ / EBITDA−',
    {'font-size':10,'font-weight':600,fill:'#8a6100','text-anchor':'end'}));
  s.appendChild(txt(m.l+6,m.t+ih-6,'LOSS-MAKING  CM2− / EBITDA−',{'font-size':10,'font-weight':600,fill:'var(--crit)'}));
  [...ps].sort((a,b)=>b.rev-a.rev).forEach(p=>{
    const cx=x(p.cm2pct), cy=y(p.ebitdapct);
    const off = p.cm2pct<CLX[0]||p.cm2pct>CLX[1]||p.ebitdapct<CLY[0]||p.ebitdapct>CLY[1];
    const c=el('circle',{cx,cy,r:rad(p.rev),fill:QC[p.quad],'fill-opacity':off?.30:.62,
      stroke:'var(--surface-1)','stroke-width':2});
    if(off) c.setAttribute('stroke-dasharray','3 2');
    bind(c,`<b>${esc(p.key)}</b><div>${esc(p.cat)} · ${nf.format(p.units)} units</div>
      <div>Revenue ${R(p.rev)}</div><div>CM2 ${P(p.cm2pct)} · ${R(p.cm2_t)}</div>
      <div>EBITDA ${P(p.ebitdapct)} · ${R(p.ebitda_t)}</div>
      <div style="margin-top:4px;color:${QC[p.quad]};font-weight:600">${QN[p.quad]}</div>
      ${off?'<div style="margin-top:4px">⚠ clamped to axis range</div>':''}`);
    s.appendChild(c);
  });
  // Direct-label the biggest bubbles. Labels are selective by design: try above the bubble,
  // then below; if both collide with an already-placed label, skip it rather than overprint.
  const placed=[];
  const fits=r => r.x>=m.l-4 && r.x+r.w<=m.l+iw+4 && r.y>=m.t && r.y+r.h<=m.t+ih &&
                  !placed.some(q => r.x<q.x+q.w && q.x<r.x+r.w && r.y<q.y+q.h && q.y<r.y+r.h);
  [...ps].sort((a,b)=>b.rev-a.rev).slice(0,7).forEach(p=>{
    const cx=x(p.cm2pct), cy=y(p.ebitdapct), rr=rad(p.rev);
    // width estimate runs deliberately wide (+ padding) so the collision test errs toward dropping a label
    const w=p.key.length*6.4+6, h=14;
    const cands=[{x:cx-w/2, y:cy-rr-4-h}, {x:cx-w/2, y:cy+rr+4}];
    const spot=cands.find(c=>fits({x:c.x, y:c.y, w, h}));
    if(!spot) return;
    placed.push({x:spot.x, y:spot.y, w, h});
    s.appendChild(txt(cx, spot.y+h-2, p.key,
      {'text-anchor':'middle','font-size':10,'font-weight':600,fill:'var(--ink-1)'}));
  });
  return s;
}

function chartMethod(){
  const W=620,H=310,m={t:22,r:16,b:52,l:66};
  const iw=W-m.l-m.r, ih=H-m.t-m.b;
  const g=[{n:'Jan–Mar',o:D.periods.jan.tot.ebitda,w:D.periods.jan.grand.profit,c:D.periods.jan.tot.cm2},
           {n:'Apr–Jun',o:D.periods.apr.tot.ebitda,w:D.periods.apr.grand.profit,c:D.periods.apr.tot.cm2}];
  const vals=g.flatMap(x=>[x.o,x.w,x.c]);
  const lo=Math.min(...vals)*1.12, hi=0;
  const y=v=>m.t+ih-(v-lo)/(hi-lo)*ih;
  const s=el('svg',{viewBox:`0 0 ${W} ${H}`,role:'img','aria-label':'Old EBITDA vs new fixed-CAC profit'});
  for(const t of ticks(lo,hi,5)){
    s.appendChild(el('line',{x1:m.l,x2:m.l+iw,y1:y(t),y2:y(t),stroke:'var(--grid)','stroke-width':1}));
    s.appendChild(txt(m.l-8,y(t)+4,Rs(t),{'text-anchor':'end',fill:'var(--ink-3)'}));
  }
  s.appendChild(el('line',{x1:m.l,x2:m.l+iw,y1:y(0),y2:y(0),stroke:'var(--axis)','stroke-width':1.5}));
  const gw=iw/g.length;
  g.forEach((x,i)=>{
    const cx=m.l+gw*i+gw/2, bw=44;
    [['Old · CM2 (no overhead)',x.c,'var(--ink-3)',-1.5],
     ['Old · EBITDA (measured)',x.o,'var(--s1)',-0.5],
     ['New · fixed-CAC profit',x.w,'var(--s2)',0.5]].forEach(([nm,v,c,slot])=>{
      const bx=cx+slot*(bw+3)+1.5, h=Math.abs(y(v)-y(0));
      const b=bar(bx,y(0),bw,h,4,'bot'); b.setAttribute('fill',c);
      bind(b,`<b>${x.n}</b><div>${nm}</div><div style="font-weight:600;color:var(--ink-1)">${R(v)}</div>`);
      s.appendChild(b);
      s.appendChild(txt(bx+bw/2,y(0)+h+15,Rs(v),{'text-anchor':'middle','font-weight':600,'font-size':10.5,fill:'var(--ink-1)'}));
    });
    s.appendChild(txt(cx,H-8,x.n,{'text-anchor':'middle','font-weight':600,'font-size':12.5,fill:'var(--ink-1)'}));
  });
  return s;
}

      Actual blended marketing spend was <b>₹${Math.round(J.tot.mktg/J.tot.units)}/unit</b> in Jan–Mar and
      <b>₹${Math.round(A.tot.mktg/A.tot.units)}/unit</b> in Apr–Jun — well above the ₹${J.cac}/₹${A.cac} CAC the new method assumes.
      So the new format understates marketing by roughly
      <b>${Rs(J.tot.mktg - J.cac*J.tot.units)}</b> (Jan–Mar) and <b>${Rs(A.tot.mktg - A.cac*A.tot.units)}</b> (Apr–Jun)
      before overheads are even considered.</p>
    <p class="note" style="max-width:none;margin:0">
      The consequence: <b>products with above-average real marketing spend look artificially healthy in the new format</b>,
      and lean-spend products look worse than they are. The blended average hides exactly the thing a pricing decision
      needs to see — which SKU is actually burning the ad budget.</p>
  </div>

  <h2>Biggest methodology swings</h2>
  <p class="note">New “Profit/unit after ads+ship” minus old CM2/unit (both exclude overheads), × units.
     <b style="color:var(--pos)">Positive</b> = the new method flatters the product;
     <b style="color:var(--neg)">negative</b> = the new method penalises it. Ranked by absolute ₹ swing.</p>
  <div class="ctrls"><div class="seg" id="sw-seg">
    <button aria-pressed="true" data-p="jan">Jan–Mar</button>
    <button aria-pressed="false" data-p="apr">Apr–Jun</button></div></div>
  <div class="tw" id="sw-t"></div>

  <h2>Recommendation</h2>
  <div class="tk" style="--tkc:var(--s1)">
    <h3>Standardise on the old format — per-SKU measured marketing + allocated overhead — as the system of record.</h3>
    <p><b>Accuracy.</b> The fixed-CAC model is not a simplification, it is a different answer. It reports a
      ${Rs(J.grand.profit)} loss for Jan–Mar where the measured method finds ${Rs(J.tot.ebitda)} — a
      ${Rs(Math.abs(J.tot.ebitda-J.grand.profit))} gap, because the assumed ₹${J.cac} CAC is roughly
      ${(J.tot.mktg/J.tot.units/J.cac).toFixed(1)}× below the ₹${Math.round(J.tot.mktg/J.tot.units)} actually spent per unit.
      A leadership team reading the new format would conclude the business is far closer to breakeven than it is.</p>
    <p><b>Decision-usefulness for pricing.</b> Pricing decisions are per-SKU, and a blended CAC deletes the only
      per-SKU signal that matters here — marketing intensity. Magic Paint Dust consumes
      ₹${Math.round(J.products.find(p=>p.key==='magic paint dust').mktg_u)}/unit of marketing; the new method charges it
      ₹${J.cac} and turns a ${R(J.products.find(p=>p.key==='magic paint dust').cm2_u)}/unit CM2 into
      ${R(J.products.find(p=>p.key==='magic paint dust').new_profit_u)}/unit. That single substitution flips the read on
      the largest product in the portfolio.</p>
    <p><b>Simplicity is real but cheap to recover.</b> The new format's genuine virtues — one page, a clear
      profit/unit column, an explicit shipping line — are presentation, not method. Keep the Summary <em>layout</em>,
      but feed it per-SKU measured marketing instead of a flat CAC, and show overheads as a separate line so both
      CM2 and EBITDA survive.</p>
    <p><b>The one caveat, stated honestly.</b> Per-SKU marketing attribution is only as good as the GA/ad-platform
      mapping behind it. If that attribution is unreliable, the fix is to improve attribution — not to replace it with an
      average that is confidently wrong for every SKU. Use fixed CAC only as a cross-check on the portfolio total,
      never for a per-product pricing or delist call.</p>
  </div>`;

  document.getElementById('c-meth').appendChild(chartMethod());
  const swt=document.getElementById('sw-t');

function chartTopBottom(pk){
  const ps=[...D.periods[pk].products].sort((a,b)=>b.ebitda_t-a.ebitda_t);
  const rows=[...ps.slice(0,10), ...ps.slice(-10)];
  // m.r reserves a value-label column so labels never collide with the product names on the left.
  const W=620, rh=19, m={t:26,r:88,b:30,l:132};
  const H=m.t+m.b+rows.length*rh+14;
  const iw=W-m.l-m.r;
  const lo=Math.min(...rows.map(r=>r.ebitda_t))*1.08, hi=Math.max(...rows.map(r=>r.ebitda_t),0)*1.25||1;
  const x=v=>m.l+(v-lo)/(hi-lo)*iw;
  const s=el('svg',{viewBox:`0 0 ${W} ${H}`,role:'img','aria-label':'Top and bottom 10 products by EBITDA'});
  for(const t of ticks(lo,hi,5)){
    s.appendChild(el('line',{x1:x(t),x2:x(t),y1:m.t-6,y2:m.t+rows.length*rh+4,stroke:'var(--grid)','stroke-width':1}));
    s.appendChild(txt(x(t),H-12,Rs(t),{'text-anchor':'middle',fill:'var(--ink-3)','font-size':10}));
  }
  s.appendChild(txt(m.l,14,'Top 10 ↑',{'font-size':10.5,'font-weight':600,fill:'var(--good)'}));
  rows.forEach((p,i)=>{
    if(i===10) s.appendChild(txt(m.l,m.t+i*rh-4,'Bottom 10 ↓',{'font-size':10.5,'font-weight':600,fill:'var(--crit)'}));
    const y=m.t+i*rh+(i>=10?10:0), h=rh-6, v=p.ebitda_t;
    const bx=Math.min(x(0),x(v)), bw=Math.abs(x(v)-x(0));
    const b=bar(bx,y,Math.max(bw,1),h,4,v>=0?'right':'left');
    b.setAttribute('fill',v>=0?'var(--pos)':'var(--neg)');
    bind(b,`<b>${esc(p.key)}</b><div>${esc(p.cat)} · ${nf.format(p.units)} units</div>
      <div>Revenue ${R(p.rev)}</div><div>EBITDA ${R(p.ebitda_t)} (${P(p.ebitdapct)})</div>
      <div>CM2 ${R(p.cm2_t)} (${P(p.cm2pct)})</div>`);
    s.appendChild(b);
    s.appendChild(txt(m.l-8,y+h-3,p.key.length>19?p.key.slice(0,18)+'…':p.key,
      {'text-anchor':'end','font-size':10.5,fill:'var(--ink-1)'}));
    s.appendChild(txt(W-6,y+h-3,Rs(v),{'text-anchor':'end','font-size':10,
      'font-weight':600,fill:v>=0?'var(--pos)':'var(--ink-2)'}));
  });
  s.appendChild(el('line',{x1:x(0),x2:x(0),y1:m.t-6,y2:m.t+rows.length*rh+4,stroke:'var(--axis)','stroke-width':1.5}));
  return s;
}

function chartCats(pk){
  const cs=[...D.periods[pk].cats].filter(c=>c.rev>0).sort((a,b)=>a.ebitda-b.ebitda).slice(0,12);
  const W=620, rh=24, m={t:12,r:118,b:30,l:132};
  const H=m.t+m.b+cs.length*rh;
  const iw=W-m.l-m.r;
  const lo=Math.min(...cs.map(c=>c.ebitda))*1.08, hi=Math.max(...cs.map(c=>c.ebitda),0)*1.2||1;
  const x=v=>m.l+(v-lo)/(hi-lo)*iw;
  const s=el('svg',{viewBox:`0 0 ${W} ${H}`,role:'img','aria-label':'EBITDA by category'});
  for(const t of ticks(lo,hi,5)){
    s.appendChild(el('line',{x1:x(t),x2:x(t),y1:m.t,y2:m.t+cs.length*rh,stroke:'var(--grid)','stroke-width':1}));
    s.appendChild(txt(x(t),H-12,Rs(t),{'text-anchor':'middle',fill:'var(--ink-3)','font-size':10}));
  }
  cs.forEach((c,i)=>{
    const y=m.t+i*rh+3, h=rh-8, v=c.ebitda;
    const bx=Math.min(x(0),x(v)), bw=Math.abs(x(v)-x(0));
    const b=bar(bx,y,Math.max(bw,1),h,4,v>=0?'right':'left');
    b.setAttribute('fill',v>=0?'var(--pos)':'var(--neg)');
    bind(b,`<b>${esc(c.cat)}</b><div>${c.n} product${c.n>1?'s':''} · ${nf.format(c.units)} units</div>
      <div>Revenue ${R(c.rev)}</div><div>EBITDA ${R(c.ebitda)} (${P(c.ebitdapct)})</div>
      <div>CM2 ${R(c.cm2)} (${P(c.cm2pct)})</div>`);
    s.appendChild(b);
    s.appendChild(txt(m.l-8,y+h-3,c.cat.length>19?c.cat.slice(0,18)+'…':c.cat,
      {'text-anchor':'end','font-size':10.5,fill:'var(--ink-1)'}));
    s.appendChild(txt(W-6,y+h-3,`${Rs(v)} · ${c.ebitdapct.toFixed(0)}%`,
      {'text-anchor':'end','font-size':10,'font-weight':600,
       fill:v>=0?'var(--pos)':'var(--ink-2)'}));
  });
  s.appendChild(el('line',{x1:x(0),x2:x(0),y1:m.t,y2:m.t+cs.length*rh,stroke:'var(--axis)','stroke-width':1.5}));
  return s;
}

function chartBridge(){
  const b=D.bridge.filter(x=>Math.abs(x.impact)>0.4);
  const W=620, rh=26, m={t:12,r:20,b:32,l:148};
  const H=m.t+m.b+b.length*rh;
  const iw=W-m.l-m.r;
  const mx=Math.max(...b.map(x=>Math.abs(x.impact)))*1.3;
  const x=v=>m.l+(v+mx)/(2*mx)*iw;
  const s=el('svg',{viewBox:`0 0 ${W} ${H}`,role:'img','aria-label':'Per-unit drivers of EBITDA change'});
  for(const t of ticks(-mx,mx,5)){
    s.appendChild(el('line',{x1:x(t),x2:x(t),y1:m.t,y2:m.t+b.length*rh,stroke:'var(--grid)','stroke-width':1}));
    s.appendChild(txt(x(t),H-12,(t>0?'+':'')+'₹'+t.toFixed(0),{'text-anchor':'middle',fill:'var(--ink-3)','font-size':10}));
  }
  b.forEach((r,i)=>{
    const y=m.t+i*rh+4, h=rh-9, v=r.impact;
    const bx=Math.min(x(0),x(v)), bw=Math.abs(x(v)-x(0));
    const bb=bar(bx,y,Math.max(bw,1),h,4,v>=0?'right':'left');
    bb.setAttribute('fill',v>=0?'var(--pos)':'var(--neg)');
    bind(bb,`<b>${r.label}</b><div>Jan–Mar ${R(r.jan)} → Apr–Jun ${R(r.apr)}</div>
      <div>Change ${r.delta>=0?'+':''}${R(r.delta)}</div>
      <div style="font-weight:600;color:${v>=0?'var(--pos)':'var(--neg)'}">Effect on EBITDA/unit ${v>=0?'+':''}${R(v)}</div>`);
    s.appendChild(bb);
    s.appendChild(txt(m.l-8,y+h-3,r.label,{'text-anchor':'end','font-size':10.5,fill:'var(--ink-1)'}));
    s.appendChild(txt(v>=0?bx+bw+5:bx-5,y+h-3,(v>=0?'+':'')+'₹'+Math.abs(v).toFixed(0),
      {'text-anchor':v>=0?'start':'end','font-size':10,'font-weight':600,fill:'var(--ink-2)'}));
  });
  s.appendChild(el('line',{x1:x(0),x2:x(0),y1:m.t,y2:m.t+b.length*rh,stroke:'var(--axis)','stroke-width':1.5}));
  return s;
}

const ACTN = {
  scale:   {t:'Scale — protect ad budget', c:'var(--good)'},
  overhead:{t:'Fix overhead allocation or raise price/volume', c:'var(--warn)'},
  page:    {t:'Fix product page / pricing before spending more on traffic', c:'var(--s1)'},
  cut:     {t:'Cut acquisition spend or discontinue', c:'var(--crit)'},
  delist:  {t:'Reprice or delist — loses money before any ad spend', c:'var(--crit)'},
};
const s5map = pk => { const m={}; D.s5[pk].prods.forEach(p=>m[p.key+'||'+p.disp]=p); return m; };
const S5M = {jan:s5map('jan'), apr:s5map('apr')};
const spend = p => (p.mktg_u||0)*p.units;
function topSpenders(pk, n){
  const ps=[...D.s5[pk].prods].sort((a,b)=>spend(b)-spend(a)).slice(0,n);
  const tot=D.s5[pk].prods.reduce((s,p)=>s+spend(p),0);
  return {ps, tot, share:ps.reduce((s,p)=>s+spend(p),0)/tot*100, sum:ps.reduce((s,p)=>s+spend(p),0)};
}

function wfStages(w){
  return [
    {n:'Gross Revenue',    t:'total', v:w.gross},
    {n:'GST',              t:'gst',   d:w.gst},
    {n:'Returns',          t:'cost',  d:w.ret},
    {n:'Discounts',        t:'cost',  d:w.disc},
    {n:'Net Revenue',      t:'sub',   v:w.nr},
    {n:'Cost of Material', t:'cost',  d:w.com},
    {n:'Gross Margin',     t:'sub',   v:w.gm},
    {n:'Packaging',        t:'cost',  d:w.pack},
    {n:'Razorpay',         t:'cost',  d:w.rzp},
    {n:'Shipping',         t:'cost',  d:w.ship},
    {n:'COD',              t:'cost',  d:w.cod},
    {n:'CM1',              t:'sub',   v:w.cm1},
    {n:'Marketing Cost',   t:'mkt',   d:w.mkt},
    {n:'CM2',              t:'sub',   v:w.cm2},
    {n:'Overheads',        t:'cost',  d:w.oh},
    {n:'EBITDA',           t:'final', v:w.eb},
  ];
}
function chartWaterfall(pk, dom){
  const w=D.s5[pk].wf, st=wfStages(w);
  // m.r reserves a fixed value-label column to the right of the plot, so labels can never
  // collide with a bar or run past the viewBox regardless of bar length.
  const W=620, rh=25, m={t:12,r:106,b:58,l:118};
  const H=m.t+m.b+st.length*rh;
  const iw=W-m.l-m.r;
  const x=v=>m.l+(v-dom[0])/(dom[1]-dom[0])*iw;
  const s=el('svg',{viewBox:`0 0 ${W} ${H}`,role:'img',
    'aria-label':`${D.periods[pk].label} waterfall from gross revenue to EBITDA`});
  for(const t of ticks(dom[0],dom[1],4)){
    s.appendChild(el('line',{x1:x(t),x2:x(t),y1:m.t,y2:m.t+st.length*rh,stroke:'var(--grid)','stroke-width':1}));
    s.appendChild(txt(x(t),m.t+st.length*rh+14,Rs(t),{'text-anchor':'middle',fill:'var(--ink-3)','font-size':9.5}));
  }
  let run=0, prevX=null;
  st.forEach((g,i)=>{
    const y=m.t+i*rh+3, h=rh-8;
    let a,b,fill,op=1,val;
    if(g.d===undefined){ a=0; b=g.v; run=g.v; val=g.v;
      fill = g.t==='final' ? (g.v<0?'var(--neg)':'var(--pos)')
           : g.t==='total' ? 'var(--s1)' : (g.v<0?'var(--neg)':'var(--s1)');
      if(g.t==='sub') op=.75;
    } else { a=run-g.d; b=run; run=run-g.d; val=-g.d;
      fill = g.t==='mkt' ? 'var(--crit)' : g.t==='gst' ? 'var(--ink-3)' : 'var(--neg)';
      op = g.t==='mkt' ? 1 : g.t==='gst' ? .45 : .5;
    }
    const bx=Math.min(x(a),x(b)), bw=Math.max(Math.abs(x(b)-x(a)),1.5);
    // connector from previous stage's running edge
    if(prevX!==null) s.appendChild(el('line',{x1:prevX,x2:prevX,y1:y-3,y2:y,stroke:'var(--axis)',
      'stroke-width':1,'stroke-dasharray':'2 2'}));
    const bar_=bar(bx,y,bw,h,4,val>=0?'right':'left');
    bar_.setAttribute('fill',fill); bar_.setAttribute('fill-opacity',op);
    if(g.t==='mkt'){ bar_.setAttribute('stroke','var(--crit)'); bar_.setAttribute('stroke-width',1.5); }
    bind(bar_,`<b>${g.n}</b><div>${g.d===undefined?'Running total':'Deduction'}: ${R(val)}</div>
      <div>${(Math.abs(val)/w.gross*100).toFixed(1)}% of gross revenue</div>
      ${g.d!==undefined?`<div>Running total after: ${R(run)}</div>`:''}
      ${g.t==='gst'?'<div style="margin-top:4px">Pass-through to government — not a business leak</div>':''}`);
    s.appendChild(bar_);
    s.appendChild(txt(m.l-8,y+h-3,g.n,{'text-anchor':'end','font-size':10.5,
      'font-weight':(g.d===undefined||g.t==='mkt')?600:400,
      fill:g.t==='mkt'?'var(--crit)':'var(--ink-1)'}));
    const lab=`${Rs(val)} · ${(Math.abs(val)/w.gross*100).toFixed(1)}%`;
    s.appendChild(txt(W-6, y+h-3, lab,
      {'text-anchor':'end','font-size':9.5,'font-family':'system-ui, sans-serif',
       'font-weight':g.t==='mkt'?700:(g.d===undefined?600:400),
       fill:g.t==='mkt'?'var(--crit)':(g.d===undefined?'var(--ink-1)':'var(--ink-2)')}));
    prevX=x(run);
  });
  s.appendChild(el('line',{x1:x(0),x2:x(0),y1:m.t,y2:m.t+st.length*rh,stroke:'var(--axis)','stroke-width':1.5}));
  // on-chart callout, below the tick row
  const cy=m.t+st.length*rh+42;
  s.appendChild(el('rect',{x:m.l,y:cy-9,width:9,height:9,rx:2,fill:'var(--crit)'}));
  s.appendChild(txt(m.l+14,cy,`Flips to loss at CM2 — marketing (${Rs(-w.mkt)}) alone exceeds CM1 (${Rs(w.cm1)}).`,
    {'font-size':10.5,'font-weight':600,fill:'var(--ink-1)'}));
  return s;
}

function chartFunnel(){
  const J=D.s5.jan.fun, A=D.s5.apr.fun;
  const rows=[{n:'Items viewed',k:'viewed'},{n:'Added to cart',k:'atc'},{n:'Purchased',k:'purch'}];
  const W=620, m={t:14,r:78,b:16,l:104}, sh=78;
  const H=m.t+m.b+rows.length*sh;
  const iw=W-m.l-m.r;
  const mx=Math.max(J.viewed,A.viewed)*1.02;
  const x=v=>v/mx*iw;
  const s=el('svg',{viewBox:`0 0 ${W} ${H}`,role:'img','aria-label':'Customer funnel: views to cart to purchase'});
  rows.forEach((r,i)=>{
    const y=m.t+i*sh;
    s.appendChild(txt(m.l-8,y+24,r.n,{'text-anchor':'end','font-size':11.5,'font-weight':600,fill:'var(--ink-1)'}));
    [['Jan–Mar',J,'var(--s1)',0],['Apr–Jun',A,'var(--s2)',22]].forEach(([nm,F,c,dy])=>{
      const v=F[r.k], bw=Math.max(x(v),1.5);
      const b=bar(m.l,y+dy,bw,18,4,'right'); b.setAttribute('fill',c);
      bind(b,`<b>${nm} · ${r.n}</b><div>${nf.format(v)}</div>
        <div>${(v/F.viewed*100).toFixed(2)}% of items viewed</div>`);
      s.appendChild(b);
      s.appendChild(txt(m.l+bw+6,y+dy+13,nf.format(v),{'font-size':10.5,'font-weight':600,fill:'var(--ink-1)'}));
    });
    if(i<rows.length-1){
      const nk=rows[i+1].k;
      const jr=J[nk]/J[r.k]*100, ar=A[nk]/A[r.k]*100;
      s.appendChild(txt(m.l,y+58,`↓ converts`,{'font-size':10,fill:'var(--ink-3)'}));
      s.appendChild(txt(m.l+58,y+58,`${jr.toFixed(2)}%`,{'font-size':10.5,'font-weight':700,fill:'var(--s1)'}));
      s.appendChild(txt(m.l+104,y+58,`→`,{'font-size':10.5,fill:'var(--ink-3)'}));
      s.appendChild(txt(m.l+120,y+58,`${ar.toFixed(2)}%`,{'font-size':10.5,'font-weight':700,fill:'var(--s2)'}));
      s.appendChild(txt(m.l+166,y+58,`(${ar<jr?'worse':'better'} by ${Math.abs(ar-jr).toFixed(2)}pp)`,
        {'font-size':10,'font-weight':600,fill:ar<jr?'var(--crit)':'var(--good)'}));
    }
  });
  return s;
}

        <td class="n" style="font-weight:600">${p.v2p.toFixed(2)}%</td>
        <td class="n" style="color:var(--crit);font-weight:600">${(p.v2p/avg*100).toFixed(0)}</td>
        <td class="n">${R(p.rev)}</td><td class="n">${R(p.mktg_u)}</td>
        <td style="text-align:left"><span class="tag" style="--tc:${ACTN[p.act].c}">${ACTN[p.act].t}</span></td></tr>`).join('')}
      </tbody></table>`;
  };
  drawW('jan');
  document.getElementById('w-seg').addEventListener('click',e=>{
    const b=e.target.closest('button'); if(!b) return;
    [...e.currentTarget.children].forEach(x=>x.setAttribute('aria-pressed',x===b));
    drawW(b.dataset.p);
  });

  const ts=topSpenders('apr',5), avg=af.v2p;
  const below=ts.ps.filter(p=>p.v2p!=null && p.v2p<avg).length;
  document.getElementById('conc').innerHTML=`
    <p class="note" style="max-width:none;margin:0 0 10px">The five largest ad-spend products in Apr–Jun consume
      <b>${Rs(ts.sum)}</b> — <b>${ts.share.toFixed(1)}%</b> of all marketing spend. <b>${below} of ${ts.ps.length}</b>
      convert <em>below</em> the ${avg.toFixed(2)}% portfolio average. Their CAC is high because the page does not convert,
      not because the channel is expensive — so a blanket spend cut would shrink revenue without fixing the cause.</p>
    <div class="tw"><table><thead><tr><th>Product</th><th>Ad spend</th><th>% of total spend</th><th>Mktg/unit</th>
      <th>View→buy</th><th>Index vs avg</th><th>CM2/unit</th><th>Action</th></tr></thead>
      <tbody>${ts.ps.map(p=>`<tr><td><b>${esc(p.key)}</b></td><td class="n">${R(spend(p))}</td>
        <td class="n">${(spend(p)/ts.tot*100).toFixed(1)}%</td><td class="n">${R(p.mktg_u)}</td>
        <td class="n">${p.v2p!=null?p.v2p.toFixed(2)+'%':'—'}</td>
        <td class="n" style="color:${p.v2p!=null&&p.v2p<avg?'var(--crit)':'var(--good)'};font-weight:600">
          ${p.v2p!=null?(p.v2p/avg*100).toFixed(0):'—'}</td>
        <td class="n" style="color:${p.cm2_u<0?'var(--neg)':'var(--pos)'}">${R(p.cm2_u)}</td>
        <td style="text-align:left"><span class="tag" style="--tc:${ACTN[p.act].c}">${ACTN[p.act].t}</span></td></tr>`).join('')}
      </tbody></table></div>`;
}

/* =======================================================================
   SECTION 6 — 80/20 & GROSS MARGIN
   ======================================================================= */
const gmp = p => p.netrev_u ? p.gm_u/p.netrev_u*100 : 0;
const gmt = p => p.gm_u*p.units;
function s6matched(){
  const J={}, A={};
  D.periods.jan.products.forEach(p=>J[p.k]=p);
  D.periods.apr.products.forEach(p=>A[p.k]=p);
  return {J, A, both:Object.keys(J).filter(k=>k in A)};
}

/* GM% (x) vs EBITDA% (y), bubble = revenue — proves margin doesn't predict profit */
function chartGmVsEbitda(pk){
  const W=620,H=400,m={t:16,r:16,b:44,l:52};
  const iw=W-m.l-m.r, ih=H-m.t-m.b;
  const XD=[60,102], YD=[-260,60];
  const x=v=>m.l+(Math.max(XD[0],Math.min(XD[1],v))-XD[0])/(XD[1]-XD[0])*iw;
  const y=v=>m.t+ih-(Math.max(YD[0],Math.min(YD[1],v))-YD[0])/(YD[1]-YD[0])*ih;
  const ps=D.periods[pk].products;
  const rmax=Math.max(...ps.map(p=>p.rev)), rad=v=>4+Math.sqrt(v/rmax)*22;
  const s=el('svg',{viewBox:`0 0 ${W} ${H}`,role:'img','aria-label':'Gross margin % vs EBITDA % by product'});
  // profit/loss zones
  s.appendChild(el('rect',{x:m.l,y:y(0),width:iw,height:m.t+ih-y(0),fill:'var(--crit)','fill-opacity':.05}));
  s.appendChild(el('rect',{x:m.l,y:m.t,width:iw,height:y(0)-m.t,fill:'var(--good)','fill-opacity':.06}));
  for(const t of ticks(YD[0],YD[1],5)){
    s.appendChild(el('line',{x1:m.l,x2:m.l+iw,y1:y(t),y2:y(t),stroke:'var(--grid)','stroke-width':1}));
    s.appendChild(txt(m.l-8,y(t)+4,t+'%',{'text-anchor':'end',fill:'var(--ink-3)'}));
  }
  for(const t of [60,70,80,90,100])
    s.appendChild(txt(x(t),m.t+ih+18,t+'%',{'text-anchor':'middle',fill:'var(--ink-3)'}));
  s.appendChild(el('line',{x1:m.l,x2:m.l+iw,y1:y(0),y2:y(0),stroke:'var(--axis)','stroke-width':1.5}));
  s.appendChild(txt(m.l+iw/2,H-6,'Gross margin % of net revenue →',{'text-anchor':'middle','font-size':11.5,fill:'var(--ink-2)'}));
  s.appendChild(txt(-(m.t+ih/2),13,'← EBITDA % of net revenue',{'text-anchor':'middle','font-size':11.5,
    fill:'var(--ink-2)',transform:'rotate(-90)'}));
  s.appendChild(txt(m.l+6,y(0)-6,'PROFITABLE',{'font-size':10,'font-weight':600,fill:'var(--good)'}));
  s.appendChild(txt(m.l+6,y(0)+13,'LOSS-MAKING',{'font-size':10,'font-weight':600,fill:'var(--crit)'}));
  [...ps].sort((a,b)=>b.rev-a.rev).forEach(p=>{
    const off=p.ebitdapct<YD[0]||p.ebitdapct>YD[1]||gmp(p)<XD[0];
    const c=el('circle',{cx:x(gmp(p)),cy:y(p.ebitdapct),r:rad(p.rev),fill:QC[p.quad],
      'fill-opacity':off?.30:.6,stroke:'var(--surface-1)','stroke-width':2});
    if(off) c.setAttribute('stroke-dasharray','3 2');
    bind(c,`<b>${esc(p.key)}</b><div>${esc(p.cat)} · ${nf.format(p.units)} units</div>
      <div>Revenue ${R(p.rev)}</div><div>Gross margin ${gmp(p).toFixed(1)}% · ${R(gmt(p))}</div>
      <div>EBITDA ${P(p.ebitdapct)} · ${R(p.ebitda_t)}</div>
      <div style="margin-top:4px;color:${QC[p.quad]};font-weight:600">${QN[p.quad]}</div>`);
    s.appendChild(c);
  });
  return s;
}

/* GM% by category (weighted), sorted */
function chartGmCat(pk){
  const map={};
  D.periods[pk].products.forEach(p=>{const d=map[p.cat]||(map[p.cat]=[0,0,0]);
    d[0]+=gmt(p); d[1]+=p.netrev_u*p.units; d[2]+=p.rev;});
  const cs=Object.entries(map).map(([cat,v])=>({cat,gm:v[1]?v[0]/v[1]*100:0,rev:v[2]}))
    .filter(c=>c.rev>8000).sort((a,b)=>b.gm-a.gm);
  const port=D.periods[pk].tot.gm/D.periods[pk].tot.netrev*100;

  }

    bind(b,`<b>${esc(c.cat)}</b><div>Gross margin ${c.gm.toFixed(1)}%</div><div>Revenue ${R(c.rev)}</div>`);
    s.appendChild(b);

      {'text-anchor':'end','font-size':10.5,fill:'var(--ink-1)'}));
    s.appendChild(txt(x(c.gm)+5,yy+h-3,c.gm.toFixed(1)+'%',{'font-size':10,'font-weight':600,fill:'var(--ink-2)'}));
  });
  // portfolio reference line
  s.appendChild(el('line',{x1:x(port),x2:x(port),y1:m.t-2,y2:m.t+cs.length*rh,stroke:'var(--ink-1)',

  s.appendChild(txt(x(port),m.t-4,`portfolio ${port.toFixed(1)}%`,{'text-anchor':'middle','font-size':9.5,
    'font-weight':600,fill:'var(--ink-1)'}));
  return s;
}

/* Pareto — single axis (both series in %): bars = each SKU's share, line = cumulative */
function chartPareto(pk, metric){
  const cfg={rev:{f:p=>p.rev,all:true,lab:'revenue'},
             gm:{f:gmt,all:true,lab:'gross margin ₹'},
             loss:{f:p=>-p.ebitda_t,all:false,lab:'EBITDA loss'}}[metric];
  let ps=D.periods[pk].products.filter(p=>cfg.all||p.ebitda_t<0)
    .map(p=>({p,v:cfg.f(p)})).filter(x=>x.v>0).sort((a,b)=>b.v-a.v);
  const tot=ps.reduce((s,x)=>s+x.v,0); let cum=0;
  ps.forEach(x=>{x.share=x.v/tot*100; cum+=x.share; x.cum=cum;});
  const n20=Math.max(1,Math.round(ps.length*0.2)), share20=ps[n20-1].cum;
  const n80=ps.findIndex(x=>x.cum>=80)+1;
  const W=620,H=340,m={t:20,r:16,b:44,l:44};
  const iw=W-m.l-m.r, ih=H-m.t-m.b;
  const bw=iw/ps.length, x=i=>m.l+i*bw, y=v=>m.t+ih-v/100*ih;
  const s=el('svg',{viewBox:`0 0 ${W} ${H}`,role:'img','aria-label':`Pareto of ${cfg.lab}`});
  for(const t of [0,20,40,60,80,100]){
    s.appendChild(el('line',{x1:m.l,x2:m.l+iw,y1:y(t),y2:y(t),stroke:'var(--grid)','stroke-width':1}));
    s.appendChild(txt(m.l-8,y(t)+4,t+'%',{'text-anchor':'end',fill:'var(--ink-3)'}));
  }
  // 80% reference
  s.appendChild(el('line',{x1:m.l,x2:m.l+iw,y1:y(80),y2:y(80),stroke:'var(--warn)','stroke-width':1.5,'stroke-dasharray':'5 3'}));
  // bars (individual share)
  ps.forEach((d,i)=>{
    const h=ih-(y(d.share)-m.t);
    const b=bar(x(i)+0.5,y(d.share),Math.max(bw-1,1),h,Math.min(3,bw/2),'top');
    b.setAttribute('fill', metric==='loss'?'var(--neg)':'var(--s1)'); b.setAttribute('fill-opacity',.55);
    bind(b,`<b>${esc(d.p.key)}</b><div>Rank ${i+1} of ${ps.length}</div>
      <div>Share of ${cfg.lab}: ${d.share.toFixed(1)}%</div><div>Cumulative: ${d.cum.toFixed(1)}%</div>`);
    s.appendChild(b);
  });
  // cumulative line
  let path='M'+ps.map((d,i)=>`${(x(i)+bw/2).toFixed(1)},${y(d.cum).toFixed(1)}`).join(' L');
  s.appendChild(el('path',{d:path,fill:'none',stroke:'var(--s1)','stroke-width':2}));
  // 20%-of-SKUs marker
  const mx=x(n20);
  s.appendChild(el('line',{x1:mx,x2:mx,y1:m.t,y2:m.t+ih,stroke:'var(--ink-1)','stroke-width':1,'stroke-dasharray':'3 2'}));
  const dot=el('circle',{cx:(x(n20-1)+bw/2),cy:y(share20),r:4,fill:'var(--s1)',stroke:'var(--surface-1)','stroke-width':1.5});
  s.appendChild(dot);
  s.appendChild(txt(m.l+iw,y(85),'80% line',{'text-anchor':'end','font-size':9.5,'font-weight':600,fill:'#8a6100'}));
  s.appendChild(txt(m.l+iw/2,H-6,`products, ranked by ${cfg.lab} (highest first) →`,
    {'text-anchor':'middle','font-size':11,fill:'var(--ink-2)'}));
  // callout
  s.appendChild(txt(mx+6,m.t+14,`Top ${n20} SKUs (20%) = ${share20.toFixed(1)}% of ${cfg.lab}`,
    {'font-size':11,'font-weight':700,fill:'var(--ink-1)'}));
  s.appendChild(txt(mx+6,m.t+30,`80% reached by ${n80} SKUs (${(n80/ps.length*100).toFixed(0)}% of range)`,
    {'font-size':10.5,fill:'var(--ink-2)'}));
  return s;
}

/* Q2 — category EBITDA% change, diverging */
function chartCatChange(){
  const agg=pk=>{const m={}; D.periods[pk].products.forEach(p=>{const d=m[p.cat]||(m[p.cat]=[0,0,0]);
    d[0]+=p.ebitda_t; d[1]+=p.netrev_u*p.units; d[2]+=p.rev;}); return m;};
  const CJ=agg('jan'), CA=agg('apr');
  const rows=Object.keys(CA).filter(c=>c in CJ && CA[c][2]>=15000).map(c=>({
    cat:c, jp:CJ[c][1]?CJ[c][0]/CJ[c][1]*100:0, ap:CA[c][1]?CA[c][0]/CA[c][1]*100:0, rev:CA[c][2]
  })).map(r=>({...r,d:r.ap-r.jp})).sort((a,b)=>b.d-a.d);
  const W=620, rh=22, m={t:14,r:60,b:28,l:118};
  const H=m.t+m.b+rows.length*rh, iw=W-m.l-m.r;

  const x=v=>m.l+(v+mx)/(2*mx)*iw;
  const s=el('svg',{viewBox:`0 0 ${W} ${H}`,role:'img','aria-label':'Category EBITDA% change Jan-Mar to Apr-Jun'});
  for(const t of ticks(-mx,mx,4)){
    s.appendChild(el('line',{x1:x(t),x2:x(t),y1:m.t,y2:m.t+rows.length*rh,stroke:'var(--grid)','stroke-width':1}));
    s.appendChild(txt(x(t),H-12,(t>0?'+':'')+t.toFixed(0)+'pp',{'text-anchor':'middle',fill:'var(--ink-3)','font-size':9.5}));
  }
  rows.forEach((r,i)=>{
    const yy=m.t+i*rh+3, h=rh-8, v=r.d;
    const bx=Math.min(x(0),x(v)), bw=Math.abs(x(v)-x(0));
    const b=bar(bx,yy,Math.max(bw,1),h,4,v>=0?'right':'left');

      <div>Change ${v>=0?'+':''}${v.toFixed(1)}pp</div><div>Apr–Jun revenue ${R(r.rev)}</div>`);
    s.appendChild(b);
    s.appendChild(txt(m.l-8,yy+h-3,r.cat.length>17?r.cat.slice(0,16)+'…':r.cat,
      {'text-anchor':'end','font-size':10.5,fill:'var(--ink-1)'}));
    s.appendChild(txt(v>=0?bx+bw+4:bx-4,yy+h-3,(v>=0?'+':'')+v.toFixed(0)+'pp',
      {'text-anchor':v>=0?'start':'end','font-size':9.5,'font-weight':600,fill:v>=0?'var(--pos)':'var(--neg)'}));
  });
  s.appendChild(el('line',{x1:x(0),x2:x(0),y1:m.t,y2:m.t+rows.length*rh,stroke:'var(--axis)','stroke-width':1.5}));
  return s;
}

/* Q3 — portfolio EBITDA-change decomposition (like-for-like, matched set) */
function chartDrivers(){
  const {J,A,both}=s6matched();
  let g=0,o=0,mk=0,h=0;
  both.forEach(k=>{const j=J[k],a=A[k],w=a.units;
    g+=(a.gm_u-j.gm_u)*w;
    o+=-(((a.gm_u-a.cm1_u))-((j.gm_u-j.cm1_u)))*w;
    mk+=-(a.mktg_u-j.mktg_u)*w;
    h+=-(a.oh_u-j.oh_u)*w;});
  const net=g+o+mk+h;
  const bars=[{n:'Gross margin',v:g,note:'stable ~82% margin'},
              {n:'Ops (pack/ship/pay/COD)',v:o,note:''},
              {n:'Marketing',v:mk,note:'the whole story'},
              {n:'Overhead',v:h,note:'allocation change, not a real saving'}];
  const W=620, rh=40, m={t:14,r:20,b:44,l:150};
  const H=m.t+m.b+(bars.length+1)*rh, iw=W-m.l-m.r;
  const mx=Math.max(...bars.map(b=>Math.abs(b.v)),Math.abs(net))*1.2;
  const x=v=>m.l+(v+mx)/(2*mx)*iw;
  const s=el('svg',{viewBox:`0 0 ${W} ${H}`,role:'img','aria-label':'EBITDA change decomposition'});
  for(const t of ticks(-mx,mx,4)){
    s.appendChild(el('line',{x1:x(t),x2:x(t),y1:m.t,y2:m.t+(bars.length+1)*rh,stroke:'var(--grid)','stroke-width':1}));
    s.appendChild(txt(x(t),H-12,Rs(t),{'text-anchor':'middle',fill:'var(--ink-3)','font-size':9.5}));
  }
  const drawBar=(r,i,bold)=>{
    const h=18, yy=m.t+i*rh+(rh-h)/2-3, v=r.v;
    const bx=Math.min(x(0),x(v)), bw=Math.abs(x(v)-x(0));
    const b=bar(bx,yy,Math.max(bw,1),h,4,v>=0?'right':'left');
    b.setAttribute('fill',bold?'var(--ink-1)':(v>=0?'var(--pos)':'var(--neg)'));
    bind(b,`<b>${r.n}</b><div>Effect on EBITDA: ${v>=0?'+':''}${R(v)}</div>${r.note?`<div>${r.note}</div>`:''}`);
    s.appendChild(b);
    // label + optional caveat stacked in the left gutter (caveat only where it earns its place)
    const ly = r.note && !bold ? yy+h-8 : yy+h-2;
    s.appendChild(txt(m.l-8,ly,r.n,{'text-anchor':'end','font-size':11,'font-weight':bold?700:400,fill:'var(--ink-1)'}));
    if(r.note && !bold) s.appendChild(txt(m.l-8,yy+h+8,r.note,{'text-anchor':'end','font-size':8.5,'font-style':'italic',fill:'var(--ink-3)'}));
    s.appendChild(txt(v>=0?bx+bw+5:bx-5,yy+h-2,(v>=0?'+':'')+Rs(v),
      {'text-anchor':v>=0?'start':'end','font-size':10,'font-weight':600,fill:bold?'var(--ink-1)':(v>=0?'var(--pos)':'var(--neg)')}));
  };
  bars.forEach((r,i)=>drawBar(r,i));
  s.appendChild(el('line',{x1:m.l,x2:m.l+iw,y1:m.t+bars.length*rh+2,y2:m.t+bars.length*rh+2,stroke:'var(--border)','stroke-width':1}));
  drawBar({n:'Net (like-for-like)',v:net,note:''},bars.length,true);
  s.appendChild(el('line',{x1:x(0),x2:x(0),y1:m.t,y2:m.t+(bars.length+1)*rh,stroke:'var(--axis)','stroke-width':1.5}));
  return s;
}

/* Q4 — unit change (x) vs EBITDA/unit (y); danger zone = grew a loss-maker */
function chartSalesBenefit(){
  const {J,A,both}=s6matched();
  const pts=both.map(k=>({key:J[k].key,du:A[k].units-J[k].units,ebu:A[k].ebitda_u,rev:A[k].rev,
    ju:J[k].units,au:A[k].units}));
  const W=620,H=380,m={t:16,r:16,b:46,l:60};
  const iw=W-m.l-m.r, ih=H-m.t-m.b;
  const XD=[-90,110], YD=[-1500,400];
  const x=v=>m.l+(Math.max(XD[0],Math.min(XD[1],v))-XD[0])/(XD[1]-XD[0])*iw;
  const y=v=>m.t+ih-(Math.max(YD[0],Math.min(YD[1],v))-YD[0])/(YD[1]-YD[0])*ih;
  const rmax=Math.max(...pts.map(p=>p.rev)), rad=v=>4+Math.sqrt(v/rmax)*20;
  const s=el('svg',{viewBox:`0 0 ${W} ${H}`,role:'img','aria-label':'Unit growth vs EBITDA per unit'});
  // danger quadrant: grew (x>0) AND loses money (y<0)
  s.appendChild(el('rect',{x:x(0),y:y(0),width:m.l+iw-x(0),height:m.t+ih-y(0),fill:'var(--crit)','fill-opacity':.08}));
  for(const t of ticks(YD[0],YD[1],5)){
    s.appendChild(el('line',{x1:m.l,x2:m.l+iw,y1:y(t),y2:y(t),stroke:'var(--grid)','stroke-width':1}));
    s.appendChild(txt(m.l-8,y(t)+4,Rs(t),{'text-anchor':'end',fill:'var(--ink-3)'}));
  }
  for(const t of ticks(XD[0],XD[1],5))
    s.appendChild(txt(x(t),m.t+ih+18,(t>0?'+':'')+t,{'text-anchor':'middle',fill:'var(--ink-3)'}));
  s.appendChild(el('line',{x1:x(0),x2:x(0),y1:m.t,y2:m.t+ih,stroke:'var(--axis)','stroke-width':1.5}));
  s.appendChild(el('line',{x1:m.l,x2:m.l+iw,y1:y(0),y2:y(0),stroke:'var(--axis)','stroke-width':1.5}));
  s.appendChild(txt(m.l+iw/2,H-6,'← sold fewer     unit change Jan–Mar → Apr–Jun     sold more →',
    {'text-anchor':'middle','font-size':11,fill:'var(--ink-2)'}));
  s.appendChild(txt(-(m.t+ih/2),14,'← EBITDA per unit',{'text-anchor':'middle','font-size':11.5,
    fill:'var(--ink-2)',transform:'rotate(-90)'}));
  s.appendChild(txt(m.l+iw-6,m.t+ih-6,'DANGER: grew a loss-maker',{'text-anchor':'end','font-size':10,'font-weight':600,fill:'var(--crit)'}));
  [...pts].sort((a,b)=>b.rev-a.rev).forEach(p=>{
    const off=p.du<XD[0]||p.du>XD[1]||p.ebu<YD[0]||p.ebu>YD[1];
    const danger=p.du>0 && p.ebu<0;
    const c=el('circle',{cx:x(p.du),cy:y(p.ebu),r:rad(p.rev),
      fill:danger?'var(--crit)':(p.ebu>=0?'var(--good)':'var(--ink-3)'),
      'fill-opacity':off?.3:.55,stroke:'var(--surface-1)','stroke-width':2});
    if(off) c.setAttribute('stroke-dasharray','3 2');
    bind(c,`<b>${esc(p.key)}</b><div>Units ${nf.format(p.ju)} → ${nf.format(p.au)} (${p.du>=0?'+':''}${nf.format(p.du)})</div>
      <div>EBITDA/unit ${R(p.ebu)}</div><div>Apr–Jun revenue ${R(p.rev)}</div>
      ${danger?'<div style="margin-top:4px;color:var(--crit);font-weight:600">Grew a loss-making product</div>':''}`);
    s.appendChild(c);
  });
  // label the biggest growers
  const placed=[];
  const fits=r=>!placed.some(q=>r.x<q.x+q.w&&q.x<r.x+r.w&&r.y<q.y+q.h&&q.y<r.y+r.h);
  [...pts].filter(p=>p.du>0).sort((a,b)=>b.du-a.du).slice(0,5).forEach(p=>{
    const w=p.key.length*6.4+6,h=14,cx=x(p.du),cy=y(p.ebu),rr=rad(p.rev);
    const spot=[{x:cx-w/2,y:cy-rr-4-h},{x:cx-w/2,y:cy+rr+4}].find(c=>fits({x:c.x,y:c.y,w,h}));
    if(!spot) return; placed.push({x:spot.x,y:spot.y,w,h});
    s.appendChild(txt(cx,spot.y+h-2,p.key,{'text-anchor':'middle','font-size':10,'font-weight':600,fill:'var(--ink-1)'}));
  });
  return s;
}

function renderS6(){
  const {J,A,both}=s6matched();
  const TJ=D.periods.jan.tot, TA=D.periods.apr.tot;
  // GM% distribution
  const gmAll=pk=>D.periods[pk].products.map(gmp).sort((a,b)=>a-b);
  const gj=gmAll('jan'), ga=gmAll('apr');
  const med=arr=>arr[Math.floor(arr.length/2)];
  // like-for-like decomposition
  let dGM=0,dOps=0,dMkt=0,dOH=0;
  both.forEach(k=>{const j=J[k],a=A[k],w=a.units;
    dGM+=(a.gm_u-j.gm_u)*w; dOps+=-(((a.gm_u-a.cm1_u))-((j.gm_u-j.cm1_u)))*w;
    dMkt+=-(a.mktg_u-j.mktg_u)*w; dOH+=-(a.oh_u-j.oh_u)*w;});
  const llNet=dGM+dOps+dMkt+dOH;
  // improvement counts
  const imp=both.filter(k=>A[k].ebitda_u>J[k].ebitda_u).length;
  // sales benefit
  const grew=both.filter(k=>A[k].units>J[k].units);
  const grewLoss=grew.filter(k=>A[k].ebitda_t<0);
  const incLoss=grew.filter(k=>A[k].ebitda_u<0).reduce((s,k)=>s+(A[k].units-J[k].units)*A[k].ebitda_u,0);
  // loss concentration (Apr)
  const losers=[...D.periods.apr.products].filter(p=>p.ebitda_t<0).sort((a,b)=>a.ebitda_t-b.ebitda_t);
  const totLoss=losers.reduce((s,p)=>s+p.ebitda_t,0);
  const n20=Math.round(D.periods.apr.products.length*0.2);
  const loss20=losers.slice(0,n20).reduce((s,p)=>s+p.ebitda_t,0)/totLoss*100;
  const top3=losers.slice(0,3);
  const top3loss=top3.reduce((s,p)=>s+p.ebitda_t,0)/totLoss*100;
  const top3rev=top3.reduce((s,p)=>s+p.rev,0)/TA.rev*100;

  document.getElementById('s6').innerHTML=`
  <h2 style="margin-top:8px">The 80/20 view — and the four questions</h2>
  <p class="lede">This page answers: <b>when is EBITDA lowest, where are we improving, why, and did sales help?</b>
    The short version — gross margin is <b>uniformly healthy (${(TA.gm/TA.netrev*100).toFixed(1)}%)</b> so it can't explain the
    loss; the loss is Pareto-concentrated in the <em>same</em> handful of SKUs that drive revenue; and on a like-for-like
    basis the business got <b>worse</b>, not better.</p>

  <h2>Part A · Gross margin % by product — healthy, and nearly identical across the range</h2>
  <p class="note">Every product converts revenue to gross margin well, and they barely differ. That is the point:
    <b>gross margin does not separate winners from losers here</b> — the loss is entirely downstream of this line.</p>
  <div class="stats">
    <div class="stat"><div class="v">${(TA.gm/TA.netrev*100).toFixed(1)}%</div><div class="l">Portfolio GM% (Apr–Jun)</div>
      <div class="s">Jan–Mar ${(TJ.gm/TJ.netrev*100).toFixed(1)}% — essentially unchanged</div></div>
    <div class="stat"><div class="v">${med(ga).toFixed(1)}%</div><div class="l">Median product GM%</div>
      <div class="s">half of products above, half below</div></div>
    <div class="stat"><div class="v">${ga[0].toFixed(1)}–${ga[ga.length-1].toFixed(0)}%</div><div class="l">Full GM% range</div>
      <div class="s">a tight ${(ga[ga.length-1]-ga[0]).toFixed(0)}-point band across ${ga.length} products</div></div>
    <div class="stat"><div class="v" style="color:var(--crit)">${P(TA.ebitdapct)}</div><div class="l">…yet EBITDA%</div>
      <div class="s">the ~${(TA.gm/TA.netrev*100).toFixed(0)} points of margin are entirely consumed downstream</div></div>
  </div>
  <h3 style="font-size:13.5px;margin:20px 0 3px">Gross margin % vs EBITDA % — margin is high everywhere; profit is not</h3>
  <p class="note">Bubbles sit far to the right (high GM%) but scatter from top to bottom on EBITDA%. If margin drove profit,
    they'd line up diagonally — they don't. Bubble size = revenue.</p>
  <div class="ctrls"><div class="seg" id="gm-seg">
    <button aria-pressed="true" data-p="jan">Jan–Mar</button>
    <button aria-pressed="false" data-p="apr">Apr–Jun</button></div>
    <span class="lg" style="margin:0"><span><i style="background:var(--good)"></i>Star</span>
      <span><i style="background:var(--warn)"></i>Overhead-heavy</span>
      <span><i style="background:var(--crit)"></i>Loss-making</span></span></div>
  <div class="chart" id="c-gmsc"></div>
  <h3 style="font-size:13.5px;margin:22px 0 3px">Gross margin % by category</h3>
  <p class="note">Weighted GM% per category, sorted, against the portfolio line. Even the lowest categories clear ~66% —
    combos carry slightly more cost of goods, but nothing here is a margin problem.</p>
  <div class="ctrls"><div class="seg" id="gmcat-seg">
    <button aria-pressed="true" data-p="jan">Jan–Mar</button>
    <button aria-pressed="false" data-p="apr">Apr–Jun</button></div></div>
  <div class="chart" id="c-gmcat"></div>

  <h2>Part B · The 80/20 rule — revenue, margin, and loss all concentrate in the same few SKUs</h2>
  <p class="note">Products ranked highest-first. Bars = each SKU's share; the line = cumulative share. The
    <span style="color:#8a6100;font-weight:600">amber 80% line</span> and the marker at the top 20% of SKUs show the
    concentration. Switch the metric to see the punchline: <b>the loss concentrates in the same SKUs as the revenue.</b></p>
  <div class="ctrls">
    <div class="seg" id="par-metric">
      <button aria-pressed="true" data-m="rev">Revenue</button>
      <button aria-pressed="false" data-m="gm">Gross margin ₹</button>
      <button aria-pressed="false" data-m="loss">EBITDA loss</button></div>
    <div class="seg" id="par-period">
      <button aria-pressed="true" data-p="jan">Jan–Mar</button>
      <button aria-pressed="false" data-p="apr">Apr–Jun</button></div>
  </div>
  <div class="chart" id="c-par"></div>
  <div class="prob" style="--pc:var(--crit);margin-top:12px">
    <h4>The concentration paradox — your biggest products are your biggest losses</h4>
    <p>In Apr–Jun the top <b>${n20} SKUs (20%)</b> generate <b>${loss20.toFixed(0)}%</b> of the entire EBITDA loss. The three
      deepest holes — <b>${top3.map(p=>esc(p.key)).join('</b>, <b>')}</b> — are <b>${top3loss.toFixed(0)}%</b> of the loss on
      <b>${top3rev.toFixed(0)}%</b> of revenue. These are also among the top revenue lines. So the usual instinct — “scale
      the winners” — scales the loss. The winners only become winners once their CAC is fixed (Section 5).</p>
  </div>

  <h2>Part C · The four questions, answered</h2>

  <div class="qa" style="--qac:var(--crit)">
    <div class="q">Question 1</div>
    <h3>When is our EBITDA lowest? <span class="verdict" style="--vc:var(--crit)">Apr–Jun, by every rate measure</span></h3>
    <div class="ans">
      <p>Both quarters lose heavily. In absolute rupees the loss looks <em>smaller</em> in Apr–Jun (<b>${Rs(TA.ebitda)}</b>
        vs <b>${Rs(TJ.ebitda)}</b>) — but only because ${Math.abs((TA.units/TJ.units-1)*100).toFixed(0)}% fewer units were sold.</p>
      <p>On the honest lenses, Apr–Jun is worse: EBITDA margin <b>${P(TJ.ebitdapct)} → ${P(TA.ebitdapct)}</b> of net revenue,
        and holding the product mix constant (like-for-like), EBITDA <b>deteriorated ${Rs(llNet)}</b>. The rupee
        “improvement” of ${Rs(TA.ebitda-TJ.ebitda)} is entirely the business shrinking — not recovering.</p>
    </div>
  </div>

  <div class="qa" style="--qac:var(--warn)">
    <div class="q">Question 2</div>
    <h3>Where are we making improvements? <span class="verdict" style="--vc:var(--warn)">Narrow &amp; fragile</span></h3>
    <div class="ans">
      <p><b>${imp} of ${both.length}</b> products improved EBITDA/unit, and a few categories genuinely got better —
        combos <b>+${(D.periods.apr.cats.find(c=>c.cat==='Combo').ebitdapct-D.periods.jan.cats.find(c=>c.cat==='Combo').ebitdapct).toFixed(1)}pp</b>,
        plus FP8, SR and Apron. But it's outweighed by sharp declines — <b>ABC Kit</b> fell from a star to −108.8% EBITDA,
        Canvas Kit and Crayons worsened 55–67pp. Net, the wins are smaller than the losses.</p>
      <p class="note" style="margin:8px 0 0;max-width:none">Category EBITDA% change, Jan–Mar → Apr–Jun
        (<span style="color:var(--pos);font-weight:600">right = improved</span>,
        <span style="color:var(--neg);font-weight:600">left = worsened</span>):</p>
    </div>
    <div class="chart" id="c-catchg" style="margin-top:10px"></div>
  </div>

  <div class="qa" style="--qac:var(--s1)">
    <div class="q">Question 3</div>
    <h3>What are the reasons? <span class="verdict" style="--vc:var(--s1)">Marketing — not margin, not shipping</span></h3>
    <div class="ans">
      <p>Decomposing the like-for-like EBITDA change into its drivers: gross margin <b>${dGM>=0?'+':''}${Rs(dGM)}</b> (barely
        moved — GM% is stable), operating costs <b>${Rs(dOps)}</b>, and <b>marketing ${Rs(dMkt)}</b> — the entire swing.
        Overhead shows <b>+${Rs(dOH)}</b>, but that is the per-unit allocation dropping ₹270→₹229, an accounting change,
        <em>not</em> a real saving. Strip it out and the operational picture is worse still.</p>
      <p><b>Every product's EBITDA movement is a marketing movement.</b> That is why gross-margin analysis (Part A) finds
        nothing — the cause sits four lines below it.</p>
    </div>
    <div class="chart" id="c-drivers" style="margin-top:10px"></div>
  </div>

  <div class="qa" style="--qac:var(--crit)">
    <div class="q">Question 4</div>
    <h3>Was there a sales benefit? <span class="verdict" style="--vc:var(--crit)">No — growth made it worse</span></h3>
    <div class="ans">
      <p>Revenue fell <b>${Math.abs((TA.rev/TJ.rev-1)*100).toFixed(1)}%</b> and units <b>${Math.abs((TA.units/TJ.units-1)*100).toFixed(1)}%</b>.
        Worse, of the <b>${grew.length}</b> products that <em>did</em> grow units, <b>${grewLoss.length}</b> are loss-making —
        the added volume piled on roughly <b>${Rs(incLoss)}</b> of extra loss. Where we grew sales, we grew the wrong sales.</p>
      <p class="note" style="margin:8px 0 0;max-width:none">Each product's unit change vs its EBITDA/unit. The
        <span style="color:var(--crit);font-weight:600">shaded danger zone</span> (grew &amp; loses money) is where most of
        the growth landed:</p>
    </div>
    <div class="chart" id="c-sales" style="margin-top:10px"></div>
  </div>

  <div class="card">
    <p class="note" style="max-width:none;margin:0"><b>Method.</b> All figures computed from the reconciled model
      (old-format “Final” sheets), no recomputation of totals. GM% = gross margin ÷ net revenue. “Like-for-like” uses the
      ${both.length} products present in both periods, weighting each per-unit change by Apr–Jun units, which isolates rate
      and mix effects from the volume drop. Driver identity ΔGM + ΔOps + ΔMarketing + ΔOverhead = ΔEBITDA holds exactly.</p>
  </div>`;

  const bindSeg=(id,fn)=>{const h=fn; document.getElementById(id).addEventListener('click',e=>{
    const b=e.target.closest('button'); if(!b) return;
    [...e.currentTarget.children].forEach(x=>x.setAttribute('aria-pressed',x===b)); h(b);});};

  const gsc=document.getElementById('c-gmsc'); gsc.appendChild(chartGmVsEbitda('jan'));
  bindSeg('gm-seg',b=>{gsc.innerHTML=''; gsc.appendChild(chartGmVsEbitda(b.dataset.p));});
  const gc=document.getElementById('c-gmcat'); gc.appendChild(chartGmCat('jan'));
  bindSeg('gmcat-seg',b=>{gc.innerHTML=''; gc.appendChild(chartGmCat(b.dataset.p));});

  let parState={m:'rev',p:'jan'};
  const par=document.getElementById('c-par');
  const drawPar=()=>{par.innerHTML=''; par.appendChild(chartPareto(parState.p,parState.m));};
  drawPar();
  bindSeg('par-metric',b=>{parState.m=b.dataset.m; drawPar();});
  bindSeg('par-period',b=>{parState.p=b.dataset.p; drawPar();});

  document.getElementById('c-catchg').appendChild(chartCatChange());
  document.getElementById('c-drivers').appendChild(chartDrivers());
  document.getElementById('c-sales').appendChild(chartSalesBenefit());
}

/* ---------- section nav ---------- */
const done={};
const renderers={s1:renderS1,s2:renderS2,s3:renderS3,s4:renderS4,s5:renderS5,s6:renderS6};
function show(id){
  document.querySelectorAll('nav button').forEach(b=>b.setAttribute('aria-selected', b.dataset.tab===id));
  document.querySelectorAll('section[role="tabpanel"]').forEach(s=>s.hidden = s.id!==id);
  if(!done[id]){ renderers[id](); done[id]=true; }
  scrollTo({top:0});
}
document.querySelector('nav').addEventListener('click',e=>{
  const b=e.target.closest('button[data-tab]'); if(b) show(b.dataset.tab);
});
show('s1');
</script>
