    :root:where(:not([data-theme="light"])) {
      color-scheme: dark;
      --surface-1: #1a1a19; --plane: #0d0d0d;
      --ink-1: #ffffff; --ink-2: #c3c2b7; --ink-3: #898781;
      --grid: #2c2c2a; --axis: #383835; --border: rgba(255,255,255,0.10);
      --s1: #3987e5; --s2: #199e70;
      --pos: #3987e5; --neg: #e66767;
      --good: #0ca30c; --warn: #fab219; --crit: #d03b3b;
      --wash: rgba(255,255,255,0.05);
    }
  }
  :root[data-theme="dark"] {
    color-scheme: dark;
    --surface-1: #1a1a19; --plane: #0d0d0d;
    --ink-1: #ffffff; --ink-2: #c3c2b7; --ink-3: #898781;
    --grid: #2c2c2a; --axis: #383835; --border: rgba(255,255,255,0.10);
    --s1: #3987e5; --s2: #199e70;
    --pos: #3987e5; --neg: #e66767;
    --wash: rgba(255,255,255,0.05);
  }

  * { box-sizing: border-box; }
  body {
    margin: 0; background: var(--plane); color: var(--ink-1);
    font-family: system-ui, -apple-system, "Segoe UI", sans-serif;
    font-size: 15px; line-height: 1.5; -webkit-font-smoothing: antialiased;
  }
  .wrap { max-width: 1180px; margin: 0 auto; padding: 0 20px 80px; }

  header.top { border-bottom: 1px solid var(--border); background: var(--surface-1); }
  .top-in { max-width: 1180px; margin: 0 auto; padding: 18px 20px 0; }
  .chan-row { margin-bottom: 16px; }
  .seg.chan { border-radius: 8px; }
  .seg.chan button { padding: 8px 16px; font-size: 13px; font-weight: 600; }
  h1 { font-size: 22px; margin: 0 0 4px; letter-spacing: -0.01em; }
  .sub { color: var(--ink-2); font-size: 13.5px; margin: 0 0 16px; }
  nav { display: flex; gap: 2px; flex-wrap: wrap; }
  nav button {
    background: none; border: 0; border-bottom: 2px solid transparent;
    padding: 9px 14px; font: inherit; font-size: 13.5px; font-weight: 500;
    color: var(--ink-2); cursor: pointer; white-space: nowrap;
  }
  nav button:hover { color: var(--ink-1); background: var(--wash); }
  nav button[aria-selected="true"] { color: var(--s1); border-bottom-color: var(--s1); font-weight: 600; }

  section[role="tabpanel"] { padding-top: 26px; }
  section[hidden] { display: none; }
  h2 { font-size: 17px; margin: 34px 0 3px; letter-spacing: -0.01em; }
  h2:first-of-type { margin-top: 6px; }
  .note { color: var(--ink-2); font-size: 13px; margin: 0 0 14px; max-width: 78ch; }
  .card { background: var(--surface-1); border: 1px solid var(--border); border-radius: 10px; padding: 16px; }

  /* KPI */
  .kpis { display: grid; grid-template-columns: repeat(auto-fit, minmax(215px, 1fr)); gap: 12px; }
  .kpi { background: var(--surface-1); border: 1px solid var(--border); border-radius: 10px; padding: 14px 15px; }
  .kpi h3 { margin: 0 0 10px; font-size: 11.5px; font-weight: 600; letter-spacing: .05em;
            text-transform: uppercase; color: var(--ink-3); }
  .kpi-row { display: flex; justify-content: space-between; align-items: baseline; gap: 8px; padding: 3px 0; }
  .kpi-lab { font-size: 12px; color: var(--ink-2); }
  .kpi-val { font-size: 17px; font-weight: 600; letter-spacing: -0.01em; }
  .kpi-val.sm { font-size: 13px; font-weight: 500; color: var(--ink-2); }
  .kpi-d { margin-top: 9px; padding-top: 9px; border-top: 1px solid var(--border);
           display: flex; justify-content: space-between; align-items: baseline; font-size: 12.5px; }
  .up { color: var(--good); font-weight: 600; } .down { color: var(--crit); font-weight: 600; }
  .flat { color: var(--ink-2); font-weight: 600; }

  /* quadrant cards */
  .quads { display: grid; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); gap: 12px; }
  .quad { background: var(--surface-1); border: 1px solid var(--border); border-radius: 10px;
          padding: 14px; border-left: 3px solid var(--qc); }
  .quad .qh { display: flex; align-items: center; gap: 7px; font-weight: 600; font-size: 13.5px; margin-bottom: 2px; }
  .qdot { width: 9px; height: 9px; border-radius: 2px; background: var(--qc); flex: none; }
  .quad .qd { font-size: 12px; color: var(--ink-2); margin-bottom: 11px; min-height: 32px; }
  .qgrid { display: grid; grid-template-columns: 1fr 1fr; gap: 7px 10px; font-size: 12px; }
  .qgrid b { display: block; font-size: 15px; font-weight: 600; }
  .qgrid span { color: var(--ink-3); font-size: 11px; }

  /* tables */
  .tw { overflow-x: auto; border: 1px solid var(--border); border-radius: 10px; background: var(--surface-1); }
  table { border-collapse: collapse; width: 100%; font-size: 13px; }
  th, td { padding: 8px 11px; text-align: right; white-space: nowrap; border-bottom: 1px solid var(--grid); }
  th:first-child, td:first-child { text-align: left; position: sticky; left: 0; background: var(--surface-1); }
  th { font-size: 11px; font-weight: 600; letter-spacing: .04em; text-transform: uppercase;
       color: var(--ink-3); background: var(--surface-1); position: sticky; top: 0; z-index: 1; }
  th.s { cursor: pointer; user-select: none; }
  th.s:hover { color: var(--ink-1); }
  th:first-child { z-index: 2; }
  tbody tr:hover td { background: var(--wash); }
  tbody tr:last-child td { border-bottom: 0; }
  td.n { font-variant-numeric: tabular-nums; }
  .tag { display: inline-flex; align-items: center; gap: 5px; font-size: 11px; font-weight: 600;
         padding: 2px 7px; border-radius: 20px; border: 1px solid var(--border); }
  .tag::before { content: ""; width: 6px; height: 6px; border-radius: 50%; background: var(--tc); }
  .mono { font-variant-numeric: tabular-nums; }
  .muted { color: var(--ink-3); }

  /* controls */
  .ctrls { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; margin-bottom: 12px; }
  .seg { display: inline-flex; border: 1px solid var(--border); border-radius: 7px; overflow: hidden; }
  .seg button { background: var(--surface-1); border: 0; padding: 6px 12px; font: inherit; font-size: 12.5px;
                color: var(--ink-2); cursor: pointer; }
  .seg button + button { border-left: 1px solid var(--border); }
  .seg button[aria-pressed="true"] { background: var(--s1); color: #fff; font-weight: 600; }
  input[type="search"], select {
    background: var(--surface-1); border: 1px solid var(--border); border-radius: 7px;
    padding: 6px 10px; font: inherit; font-size: 12.5px; color: var(--ink-1); min-width: 180px;
  }

  /* banner */
  .banner { border-radius: 10px; padding: 14px 16px; border: 1px solid var(--border);
            border-left: 3px solid var(--bc); background: var(--surface-1); margin-bottom: 12px; }
  .banner h4 { margin: 0 0 5px; font-size: 13.5px; display: flex; align-items: center; gap: 7px; }
  .banner .ic { width: 16px; height: 16px; border-radius: 50%; background: var(--bc); color: #fff;
                font-size: 11px; font-weight: 700; display: grid; place-items: center; flex: none; }
  .banner p { margin: 0; font-size: 12.5px; color: var(--ink-2); }
  .banner table { margin-top: 10px; font-size: 12px; }

  /* legend */
  .lg { display: flex; gap: 16px; flex-wrap: wrap; font-size: 12px; color: var(--ink-2); margin-bottom: 8px; }
  .lg i { display: inline-block; width: 10px; height: 10px; border-radius: 2px; margin-right: 6px; vertical-align: -1px; }

  /* takeaways */
  .tk { background: var(--surface-1); border: 1px solid var(--border); border-radius: 10px;
        padding: 15px 17px; margin-bottom: 11px; border-left: 3px solid var(--tkc, var(--s1)); }
  .tk h3 { margin: 0 0 6px; font-size: 14.5px; }
  .tk p { margin: 0; font-size: 13.5px; color: var(--ink-2); }
  .tk p + p { margin-top: 7px; }
  .tk b { color: var(--ink-1); font-variant-numeric: tabular-nums; }

  /* action panel */
  .acts { display: grid; grid-template-columns: repeat(auto-fit, minmax(330px, 1fr)); gap: 12px; }
  .act { background: var(--surface-1); border: 1px solid var(--border); border-radius: 10px;
         padding: 0; overflow: hidden; display: flex; flex-direction: column; }

  .act-sev { display: inline-flex; align-items: center; gap: 5px; font-size: 10.5px; font-weight: 700;
             letter-spacing: .06em; text-transform: uppercase; color: var(--ac); margin-bottom: 6px; }
  .act-sev svg { width: 13px; height: 13px; flex: none; }
  .act-h h3 { margin: 0; font-size: 14.5px; line-height: 1.35; letter-spacing: -0.01em; text-wrap: balance; }
  .act-b { padding: 0 15px 12px; font-size: 12.5px; color: var(--ink-2); flex: 1; }
  .act-b b { color: var(--ink-1); font-variant-numeric: tabular-nums; }
  .act-do { margin: 0 15px 14px; padding: 10px 12px; background: var(--wash); border-radius: 7px;

  .prob p { margin: 0; font-size: 12.5px; color: var(--ink-2); }
  .prob b { color: var(--ink-1); font-variant-numeric: tabular-nums; }

  /* stat tiles (single value, no delta) */
  .stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 12px; }

  svg { display: block; max-width: 100%; height: auto; }
  .chart { background: var(--surface-1); border: 1px solid var(--border); border-radius: 10px;

  .tip { position: fixed; pointer-events: none; z-index: 99; background: var(--surface-1);

  .tip div { color: var(--ink-2); font-variant-numeric: tabular-nums; }
  .grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  @media (max-width: 860px) { .grid2 { grid-template-columns: 1fr; } }

/* ---------- formatting ---------- */
const nf = new Intl.NumberFormat('en-IN', {maximumFractionDigits:0});
const R  = v => (v<0?'-':'') + '₹' + nf.format(Math.abs(Math.round(v)));
const Rs = v => { const a=Math.abs(v); const s=v<0?'-':'';
  if (a>=1e7) return s+'₹'+(a/1e7).toFixed(2)+' Cr';
  if (a>=1e5) return s+'₹'+(a/1e5).toFixed(2)+' L';
  if (a>=1e3) return s+'₹'+(a/1e3).toFixed(1)+'k';
  return s+'₹'+Math.round(a); };
const P  = v => (v==null? '—' : v.toFixed(1)+'%');
const esc = s => String(s).replace(/[&<>"]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
const QC = {star:'var(--good)', overhead:'var(--warn)', loss:'var(--crit)'};
const QN = {star:'Star', overhead:'Overhead-heavy', loss:'Loss-making'};

/* ---------- tooltip ---------- */
const tip = document.getElementById('tip');
function showTip(e, html){ tip.innerHTML = html; tip.style.opacity = 1;
  const r = tip.getBoundingClientRect();
  let x = e.clientX + 14, y = e.clientY + 14;
  if (x + r.width > innerWidth - 8) x = e.clientX - r.width - 14;
  if (y + r.height > innerHeight - 8) y = e.clientY - r.height - 14;
  tip.style.left = x + 'px'; tip.style.top = y + 'px';
}
const hideTip = () => tip.style.opacity = 0;
function bind(el, html){
  el.addEventListener('mousemove', e => showTip(e, html));
  el.addEventListener('mouseleave', hideTip);
}

/* ---------- svg helpers ---------- */
const NS = 'http://www.w3.org/2000/svg';
function el(n, a={}){ const x = document.createElementNS(NS, n);
  for (const k in a) x.setAttribute(k, a[k]); return x; }
function txt(x, y, s, a={}){ const t = el('text', Object.assign({x, y, fill:'var(--ink-2)',
  'font-size':11, 'font-family':'system-ui, sans-serif'}, a)); t.textContent = s; return t; }
/* rounded rect with 4px radius on the value end only, anchored to baseline */
function bar(x, y, w, h, r, side){
  r = Math.min(r, w/2, h/2);
  if (h <= 0.5 || r <= 0) return el('rect', {x, y, width:Math.max(w,0), height:Math.max(h,0.5)});
  let d;
  if (side === 'top')    d = `M${x},${y+h} L${x},${y+r} Q${x},${y} ${x+r},${y} L${x+w-r},${y} Q${x+w},${y} ${x+w},${y+r} L${x+w},${y+h} Z`;
  else if (side==='bot') d = `M${x},${y} L${x},${y+h-r} Q${x},${y+h} ${x+r},${y+h} L${x+w-r},${y+h} Q${x+w},${y+h} ${x+w},${y+h-r} L${x+w},${y} Z`;
  else if (side==='right')d= `M${x},${y} L${x+w-r},${y} Q${x+w},${y} ${x+w},${y+r} L${x+w},${y+h-r} Q${x+w},${y+h} ${x+w-r},${y+h} L${x},${y+h} Z`;
  else                   d = `M${x+w},${y} L${x+r},${y} Q${x},${y} ${x},${y+r} L${x},${y+h-r} Q${x},${y+h} ${x+r},${y+h} L${x+w},${y+h} Z`;
  return el('path', {d});
}
function ticks(lo, hi, n=5){
  const raw=(hi-lo)/n, mag=Math.pow(10,Math.floor(Math.log10(Math.abs(raw)||1)));
  const st=[1,2,2.5,5,10].map(m=>m*mag).find(s=>s>=raw)||mag*10;
  const out=[]; for(let v=Math.ceil(lo/st)*st; v<=hi+1e-9; v+=st) out.push(+v.toFixed(6));
  return out;
}

/* =======================================================================
   SECTION 1 — PERIOD COMPARISON
   ======================================================================= */
/* dfmt: separate formatter for the delta — percentage-valued KPIs must show a
   percentage-POINT change ("pp"), never "%", which would read as a relative move. */
function kpi(title, jv, av, fmt, jSub, aSub, betterUp=true, dfmt=null){
  const d = av - jv, pct = jv !== 0 ? d/Math.abs(jv)*100 : null;
  const df = dfmt || fmt;
  const cls = Math.abs(d) < 1e-9 ? 'flat' : (betterUp ? (d>0?'up':'down') : (d<0?'up':'down'));
  return `<div class="kpi"><h3>${title}</h3>
    <div class="kpi-row"><span class="kpi-lab">Jan–Mar</span><span class="kpi-val">${fmt(jv)}</span></div>
    ${jSub?`<div class="kpi-row"><span class="kpi-lab"></span><span class="kpi-val sm">${jSub}</span></div>`:''}
    <div class="kpi-row"><span class="kpi-lab">Apr–Jun</span><span class="kpi-val">${fmt(av)}</span></div>
    ${aSub?`<div class="kpi-row"><span class="kpi-lab"></span><span class="kpi-val sm">${aSub}</span></div>`:''}
    <div class="kpi-d"><span class="kpi-lab">Change</span>
      <span class="${cls}">${d>0?'+':''}${df(d)}${pct!=null?` · ${d>0?'+':''}${pct.toFixed(1)}%`:''}</span></div>
  </div>`;
}

/* grouped bar: CM2% & EBITDA% by period */
function chartPct(){
  const W=620, H=290, m={t:22,r:16,b:40,l:52};
  const iw=W-m.l-m.r, ih=H-m.t-m.b;
  const groups=[{n:'CM2 %', j:D.periods.jan.tot.cm2pct, a:D.periods.apr.tot.cm2pct},
                {n:'EBITDA %', j:D.periods.jan.tot.ebitdapct, a:D.periods.apr.tot.ebitdapct}];
  const vals=groups.flatMap(g=>[g.j,g.a]);
  const lo=Math.min(0,...vals)*1.12, hi=Math.max(0,...vals,5);
  const y=v=>m.t+ih-(v-lo)/(hi-lo)*ih;
  const s=el('svg',{viewBox:`0 0 ${W} ${H}`,role:'img','aria-label':'CM2% and EBITDA% by period'});
  for(const t of ticks(lo,hi,5)){
    s.appendChild(el('line',{x1:m.l,x2:m.l+iw,y1:y(t),y2:y(t),stroke:'var(--grid)','stroke-width':1}));
    s.appendChild(txt(m.l-8,y(t)+4,t.toFixed(0)+'%',{'text-anchor':'end',fill:'var(--ink-3)'}));
  }
  s.appendChild(el('line',{x1:m.l,x2:m.l+iw,y1:y(0),y2:y(0),stroke:'var(--axis)','stroke-width':1.5}));
  const gw=iw/groups.length;
  groups.forEach((g,i)=>{
    const cx=m.l+gw*i+gw/2, bw=52;
    [['Jan–Mar',g.j,'var(--s1)',-1],['Apr–Jun',g.a,'var(--s2)',1]].forEach(([nm,v,c,dir])=>{
      const bx=cx+(dir<0?-bw-2:2), top=Math.min(y(v),y(0)), h=Math.abs(y(v)-y(0));
      const b=bar(bx,top,bw,h,4,v>=0?'top':'bot'); b.setAttribute('fill',c);
      bind(b,`<b>${nm} · ${g.n}</b><div>${v.toFixed(1)}% of net revenue</div>`);
      s.appendChild(b);
      s.appendChild(txt(bx+bw/2,(v>=0?top-6:top+h+14),v.toFixed(1)+'%',
        {'text-anchor':'middle','font-weight':600,'font-size':11.5,fill:'var(--ink-1)'}));
    });
    s.appendChild(txt(cx,H-14,g.n,{'text-anchor':'middle','font-weight':600,'font-size':12.5,fill:'var(--ink-1)'}));
  });
  return s;
}

/* scatter: X=CM2%, Y=EBITDA%, size=Revenue */
const CLX=[-250,100], CLY=[-300,100];
function chartScatter(pk){
  const W=620,H=430,m={t:16,r:16,b:44,l:52};
  const iw=W-m.l-m.r, ih=H-m.t-m.b;
  const x=v=>m.l+(Math.max(CLX[0],Math.min(CLX[1],v))-CLX[0])/(CLX[1]-CLX[0])*iw;
  const y=v=>m.t+ih-(Math.max(CLY[0],Math.min(CLY[1],v))-CLY[0])/(CLY[1]-CLY[0])*ih;
  const ps=D.periods[pk].products;
  const rmax=Math.max(...ps.map(p=>p.rev));
  const rad=v=>4+Math.sqrt(v/rmax)*22;
  const s=el('svg',{viewBox:`0 0 ${W} ${H}`,role:'img','aria-label':'CM2% vs EBITDA% by product'});
  // quadrant shading
  const x0=x(0), y0=y(0);
  s.appendChild(el('rect',{x:x0,y:m.t,width:m.l+iw-x0,height:y0-m.t,fill:'var(--good)','fill-opacity':.07}));
  s.appendChild(el('rect',{x:x0,y:y0,width:m.l+iw-x0,height:m.t+ih-y0,fill:'var(--warn)','fill-opacity':.09}));
  s.appendChild(el('rect',{x:m.l,y:y0,width:x0-m.l,height:m.t+ih-y0,fill:'var(--crit)','fill-opacity':.07}));
  for(const t of ticks(CLY[0],CLY[1],5)){
    s.appendChild(el('line',{x1:m.l,x2:m.l+iw,y1:y(t),y2:y(t),stroke:'var(--grid)','stroke-width':1}));
    s.appendChild(txt(m.l-8,y(t)+4,t+'%',{'text-anchor':'end',fill:'var(--ink-3)'}));
  }
  for(const t of ticks(CLX[0],CLX[1],5))
    s.appendChild(txt(x(t),m.t+ih+18,t+'%',{'text-anchor':'middle',fill:'var(--ink-3)'}));
  s.appendChild(el('line',{x1:x0,x2:x0,y1:m.t,y2:m.t+ih,stroke:'var(--axis)','stroke-width':1.5}));
  s.appendChild(el('line',{x1:m.l,x2:m.l+iw,y1:y0,y2:y0,stroke:'var(--axis)','stroke-width':1.5}));
  s.appendChild(txt(m.l+iw/2,H-6,'CM2 % of net revenue →',{'text-anchor':'middle','font-size':11.5,fill:'var(--ink-2)'}));
  s.appendChild(txt(-(m.t+ih/2),13,'← EBITDA % of net revenue',{'text-anchor':'middle','font-size':11.5,
    fill:'var(--ink-2)',transform:'rotate(-90)'}));
  s.appendChild(txt(x0+8,m.t+14,'STARS  CM2+ / EBITDA+',{'font-size':10,'font-weight':600,fill:'var(--good)'}));
  s.appendChild(txt(m.l+iw-6,m.t+ih-6,'OVERHEAD-HEAVY  CM2+ / EBITDA−',
    {'font-size':10,'font-weight':600,fill:'#8a6100','text-anchor':'end'}));
  s.appendChild(txt(m.l+6,m.t+ih-6,'LOSS-MAKING  CM2− / EBITDA−',{'font-size':10,'font-weight':600,fill:'var(--crit)'}));
  [...ps].sort((a,b)=>b.rev-a.rev).forEach(p=>{
    const cx=x(p.cm2pct), cy=y(p.ebitdapct);
    const off = p.cm2pct<CLX[0]||p.cm2pct>CLX[1]||p.ebitdapct<CLY[0]||p.ebitdapct>CLY[1];
    const c=el('circle',{cx,cy,r:rad(p.rev),fill:QC[p.quad],'fill-opacity':off?.30:.62,
      stroke:'var(--surface-1)','stroke-width':2});
    if(off) c.setAttribute('stroke-dasharray','3 2');
    bind(c,`<b>${esc(p.key)}</b><div>${esc(p.cat)} · ${nf.format(p.units)} units</div>
      <div>Revenue ${R(p.rev)}</div><div>CM2 ${P(p.cm2pct)} · ${R(p.cm2_t)}</div>
      <div>EBITDA ${P(p.ebitdapct)} · ${R(p.ebitda_t)}</div>
      <div style="margin-top:4px;color:${QC[p.quad]};font-weight:600">${QN[p.quad]}</div>
      ${off?'<div style="margin-top:4px">⚠ clamped to axis range</div>':''}`);
    s.appendChild(c);
  });
  // Direct-label the biggest bubbles. Labels are selective by design: try above the bubble,
  // then below; if both collide with an already-placed label, skip it rather than overprint.
  const placed=[];
  const fits=r => r.x>=m.l-4 && r.x+r.w<=m.l+iw+4 && r.y>=m.t && r.y+r.h<=m.t+ih &&
                  !placed.some(q => r.x<q.x+q.w && q.x<r.x+r.w && r.y<q.y+q.h && q.y<r.y+r.h);
  [...ps].sort((a,b)=>b.rev-a.rev).slice(0,7).forEach(p=>{
    const cx=x(p.cm2pct), cy=y(p.ebitdapct), rr=rad(p.rev);
    // width estimate runs deliberately wide (+ padding) so the collision test errs toward dropping a label
    const w=p.key.length*6.4+6, h=14;
    const cands=[{x:cx-w/2, y:cy-rr-4-h}, {x:cx-w/2, y:cy+rr+4}];
    const spot=cands.find(c=>fits({x:c.x, y:c.y, w, h}));
    if(!spot) return;
    placed.push({x:spot.x, y:spot.y, w, h});
    s.appendChild(txt(cx, spot.y+h-2, p.key,
      {'text-anchor':'middle','font-size':10,'font-weight':600,fill:'var(--ink-1)'}));
  });
  return s;
}

function chartMethod(){
  const W=620,H=310,m={t:22,r:16,b:52,l:66};
  const iw=W-m.l-m.r, ih=H-m.t-m.b;
  const g=[{n:'Jan–Mar',o:D.periods.jan.tot.ebitda,w:D.periods.jan.grand.profit,c:D.periods.jan.tot.cm2},
           {n:'Apr–Jun',o:D.periods.apr.tot.ebitda,w:D.periods.apr.grand.profit,c:D.periods.apr.tot.cm2}];
  const vals=g.flatMap(x=>[x.o,x.w,x.c]);
  const lo=Math.min(...vals)*1.12, hi=0;
  const y=v=>m.t+ih-(v-lo)/(hi-lo)*ih;
  const s=el('svg',{viewBox:`0 0 ${W} ${H}`,role:'img','aria-label':'Old EBITDA vs new fixed-CAC profit'});
  for(const t of ticks(lo,hi,5)){
    s.appendChild(el('line',{x1:m.l,x2:m.l+iw,y1:y(t),y2:y(t),stroke:'var(--grid)','stroke-width':1}));
    s.appendChild(txt(m.l-8,y(t)+4,Rs(t),{'text-anchor':'end',fill:'var(--ink-3)'}));
  }
  s.appendChild(el('line',{x1:m.l,x2:m.l+iw,y1:y(0),y2:y(0),stroke:'var(--axis)','stroke-width':1.5}));
  const gw=iw/g.length;
  g.forEach((x,i)=>{
    const cx=m.l+gw*i+gw/2, bw=44;
    [['Old · CM2 (no overhead)',x.c,'var(--ink-3)',-1.5],
     ['Old · EBITDA (measured)',x.o,'var(--s1)',-0.5],
     ['New · fixed-CAC profit',x.w,'var(--s2)',0.5]].forEach(([nm,v,c,slot])=>{
      const bx=cx+slot*(bw+3)+1.5, h=Math.abs(y(v)-y(0));
      const b=bar(bx,y(0),bw,h,4,'bot'); b.setAttribute('fill',c);
      bind(b,`<b>${x.n}</b><div>${nm}</div><div style="font-weight:600;color:var(--ink-1)">${R(v)}</div>`);
      s.appendChild(b);
      s.appendChild(txt(bx+bw/2,y(0)+h+15,Rs(v),{'text-anchor':'middle','font-weight':600,'font-size':10.5,fill:'var(--ink-1)'}));
    });
    s.appendChild(txt(cx,H-8,x.n,{'text-anchor':'middle','font-weight':600,'font-size':12.5,fill:'var(--ink-1)'}));
  });
  return s;
}

      ${Rs(J.grand.profit)} loss for Jan–Mar where the measured method finds ${Rs(J.tot.ebitda)} — a
      ${Rs(Math.abs(J.tot.ebitda-J.grand.profit))} gap, because the assumed ₹${J.cac} CAC is roughly
      ${(J.tot.mktg/J.tot.units/J.cac).toFixed(1)}× below the ₹${Math.round(J.tot.mktg/J.tot.units)} actually spent per unit.
      A leadership team reading the new format would conclude the business is far closer to breakeven than it is.</p>

      per-SKU signal that matters here — marketing intensity. Magic Paint Dust consumes
      ₹${Math.round(J.products.find(p=>p.key==='magic paint dust').mktg_u)}/unit of marketing; the new method charges it
      ₹${J.cac} and turns a ${R(J.products.find(p=>p.key==='magic paint dust').cm2_u)}/unit CM2 into
      ${R(J.products.find(p=>p.key==='magic paint dust').new_profit_u)}/unit. That single substitution flips the read on
      the largest product in the portfolio.</p>
    <p><b>Simplicity is real but cheap to recover.</b> The new format's genuine virtues — one page, a clear
      profit/unit column, an explicit shipping line — are presentation, not method. Keep the Summary <em>layout</em>,
      but feed it per-SKU measured marketing instead of a flat CAC, and show overheads as a separate line so both
      CM2 and EBITDA survive.</p>

function chartTopBottom(pk){

  const rows=[...ps.slice(0,10), ...ps.slice(-10)];
  // m.r reserves a value-label column so labels never collide with the product names on the left.

  const H=m.t+m.b+rows.length*rh+14;
  const iw=W-m.l-m.r;
  const lo=Math.min(...rows.map(r=>r.ebitda_t))*1.08, hi=Math.max(...rows.map(r=>r.ebitda_t),0)*1.25||1;
  const x=v=>m.l+(v-lo)/(hi-lo)*iw;
  const s=el('svg',{viewBox:`0 0 ${W} ${H}`,role:'img','aria-label':'Top and bottom 10 products by EBITDA'});
  for(const t of ticks(lo,hi,5)){
    s.appendChild(el('line',{x1:x(t),x2:x(t),y1:m.t-6,y2:m.t+rows.length*rh+4,stroke:'var(--grid)','stroke-width':1}));
    s.appendChild(txt(x(t),H-12,Rs(t),{'text-anchor':'middle',fill:'var(--ink-3)','font-size':10}));
  }
  s.appendChild(txt(m.l,14,'Top 10 ↑',{'font-size':10.5,'font-weight':600,fill:'var(--good)'}));
  rows.forEach((p,i)=>{
    if(i===10) s.appendChild(txt(m.l,m.t+i*rh-4,'Bottom 10 ↓',{'font-size':10.5,'font-weight':600,fill:'var(--crit)'}));
    const y=m.t+i*rh+(i>=10?10:0), h=rh-6, v=p.ebitda_t;
    const bx=Math.min(x(0),x(v)), bw=Math.abs(x(v)-x(0));
    const b=bar(bx,y,Math.max(bw,1),h,4,v>=0?'right':'left');
    b.setAttribute('fill',v>=0?'var(--pos)':'var(--neg)');
    bind(b,`<b>${esc(p.key)}</b><div>${esc(p.cat)} · ${nf.format(p.units)} units</div>
      <div>Revenue ${R(p.rev)}</div><div>EBITDA ${R(p.ebitda_t)} (${P(p.ebitdapct)})</div>
      <div>CM2 ${R(p.cm2_t)} (${P(p.cm2pct)})</div>`);
    s.appendChild(b);
    s.appendChild(txt(m.l-8,y+h-3,p.key.length>19?p.key.slice(0,18)+'…':p.key,
      {'text-anchor':'end','font-size':10.5,fill:'var(--ink-1)'}));
    s.appendChild(txt(W-6,y+h-3,Rs(v),{'text-anchor':'end','font-size':10,
      'font-weight':600,fill:v>=0?'var(--pos)':'var(--ink-2)'}));
  });
  s.appendChild(el('line',{x1:x(0),x2:x(0),y1:m.t-6,y2:m.t+rows.length*rh+4,stroke:'var(--axis)','stroke-width':1.5}));
  return s;
}

function chartBridge(){
  const b=D.bridge.filter(x=>Math.abs(x.impact)>0.4);
  const W=620, rh=26, m={t:12,r:20,b:32,l:148};
  const H=m.t+m.b+b.length*rh;
  const iw=W-m.l-m.r;
  const mx=Math.max(...b.map(x=>Math.abs(x.impact)))*1.3;
  const x=v=>m.l+(v+mx)/(2*mx)*iw;
  const s=el('svg',{viewBox:`0 0 ${W} ${H}`,role:'img','aria-label':'Per-unit drivers of EBITDA change'});
  for(const t of ticks(-mx,mx,5)){
    s.appendChild(el('line',{x1:x(t),x2:x(t),y1:m.t,y2:m.t+b.length*rh,stroke:'var(--grid)','stroke-width':1}));
    s.appendChild(txt(x(t),H-12,(t>0?'+':'')+'₹'+t.toFixed(0),{'text-anchor':'middle',fill:'var(--ink-3)','font-size':10}));
  }
  b.forEach((r,i)=>{
    const y=m.t+i*rh+4, h=rh-9, v=r.impact;
    const bx=Math.min(x(0),x(v)), bw=Math.abs(x(v)-x(0));
    const bb=bar(bx,y,Math.max(bw,1),h,4,v>=0?'right':'left');
    bb.setAttribute('fill',v>=0?'var(--pos)':'var(--neg)');
    bind(bb,`<b>${r.label}</b><div>Jan–Mar ${R(r.jan)} → Apr–Jun ${R(r.apr)}</div>
      <div>Change ${r.delta>=0?'+':''}${R(r.delta)}</div>
      <div style="font-weight:600;color:${v>=0?'var(--pos)':'var(--neg)'}">Effect on EBITDA/unit ${v>=0?'+':''}${R(v)}</div>`);
    s.appendChild(bb);
    s.appendChild(txt(m.l-8,y+h-3,r.label,{'text-anchor':'end','font-size':10.5,fill:'var(--ink-1)'}));
    s.appendChild(txt(v>=0?bx+bw+5:bx-5,y+h-3,(v>=0?'+':'')+'₹'+Math.abs(v).toFixed(0),
      {'text-anchor':v>=0?'start':'end','font-size':10,'font-weight':600,fill:'var(--ink-2)'}));
  });
  s.appendChild(el('line',{x1:x(0),x2:x(0),y1:m.t,y2:m.t+b.length*rh,stroke:'var(--axis)','stroke-width':1.5}));
  return s;
}

};
const s5map = pk => { const m={}; D.s5[pk].prods.forEach(p=>m[p.key+'||'+p.disp]=p); return m; };
const S5M = {jan:s5map('jan'), apr:s5map('apr')};
const spend = p => (p.mktg_u||0)*p.units;
function topSpenders(pk, n){
  const ps=[...D.s5[pk].prods].sort((a,b)=>spend(b)-spend(a)).slice(0,n);
  const tot=D.s5[pk].prods.reduce((s,p)=>s+spend(p),0);
  return {ps, tot, share:ps.reduce((s,p)=>s+spend(p),0)/tot*100, sum:ps.reduce((s,p)=>s+spend(p),0)};
}

function wfStages(w){
  return [
    {n:'Gross Revenue',    t:'total', v:w.gross},
    {n:'GST',              t:'gst',   d:w.gst},
    {n:'Returns',          t:'cost',  d:w.ret},
    {n:'Discounts',        t:'cost',  d:w.disc},
    {n:'Net Revenue',      t:'sub',   v:w.nr},
    {n:'Cost of Material', t:'cost',  d:w.com},
    {n:'Gross Margin',     t:'sub',   v:w.gm},
    {n:'Packaging',        t:'cost',  d:w.pack},
    {n:'Razorpay',         t:'cost',  d:w.rzp},
    {n:'Shipping',         t:'cost',  d:w.ship},
    {n:'COD',              t:'cost',  d:w.cod},
    {n:'CM1',              t:'sub',   v:w.cm1},
    {n:'Marketing Cost',   t:'mkt',   d:w.mkt},
    {n:'CM2',              t:'sub',   v:w.cm2},
    {n:'Overheads',        t:'cost',  d:w.oh},
    {n:'EBITDA',           t:'final', v:w.eb},
  ];
}
function chartWaterfall(pk, dom){
  const w=D.s5[pk].wf, st=wfStages(w);
  // m.r reserves a fixed value-label column to the right of the plot, so labels can never
  // collide with a bar or run past the viewBox regardless of bar length.
  const W=620, rh=25, m={t:12,r:106,b:58,l:118};
  const H=m.t+m.b+st.length*rh;
  const iw=W-m.l-m.r;
  const x=v=>m.l+(v-dom[0])/(dom[1]-dom[0])*iw;
  const s=el('svg',{viewBox:`0 0 ${W} ${H}`,role:'img',
    'aria-label':`${D.periods[pk].label} waterfall from gross revenue to EBITDA`});
  for(const t of ticks(dom[0],dom[1],4)){
    s.appendChild(el('line',{x1:x(t),x2:x(t),y1:m.t,y2:m.t+st.length*rh,stroke:'var(--grid)','stroke-width':1}));
    s.appendChild(txt(x(t),m.t+st.length*rh+14,Rs(t),{'text-anchor':'middle',fill:'var(--ink-3)','font-size':9.5}));
  }
  let run=0, prevX=null;
  st.forEach((g,i)=>{
    const y=m.t+i*rh+3, h=rh-8;
    let a,b,fill,op=1,val;
    if(g.d===undefined){ a=0; b=g.v; run=g.v; val=g.v;
      fill = g.t==='final' ? (g.v<0?'var(--neg)':'var(--pos)')
           : g.t==='total' ? 'var(--s1)' : (g.v<0?'var(--neg)':'var(--s1)');
      if(g.t==='sub') op=.75;
    } else { a=run-g.d; b=run; run=run-g.d; val=-g.d;
      fill = g.t==='mkt' ? 'var(--crit)' : g.t==='gst' ? 'var(--ink-3)' : 'var(--neg)';
      op = g.t==='mkt' ? 1 : g.t==='gst' ? .45 : .5;
    }
    const bx=Math.min(x(a),x(b)), bw=Math.max(Math.abs(x(b)-x(a)),1.5);
    // connector from previous stage's running edge
    if(prevX!==null) s.appendChild(el('line',{x1:prevX,x2:prevX,y1:y-3,y2:y,stroke:'var(--axis)',
      'stroke-width':1,'stroke-dasharray':'2 2'}));
    const bar_=bar(bx,y,bw,h,4,val>=0?'right':'left');
    bar_.setAttribute('fill',fill); bar_.setAttribute('fill-opacity',op);
    if(g.t==='mkt'){ bar_.setAttribute('stroke','var(--crit)'); bar_.setAttribute('stroke-width',1.5); }
    bind(bar_,`<b>${g.n}</b><div>${g.d===undefined?'Running total':'Deduction'}: ${R(val)}</div>
      <div>${(Math.abs(val)/w.gross*100).toFixed(1)}% of gross revenue</div>
      ${g.d!==undefined?`<div>Running total after: ${R(run)}</div>`:''}
      ${g.t==='gst'?'<div style="margin-top:4px">Pass-through to government — not a business leak</div>':''}`);
    s.appendChild(bar_);
    s.appendChild(txt(m.l-8,y+h-3,g.n,{'text-anchor':'end','font-size':10.5,
      'font-weight':(g.d===undefined||g.t==='mkt')?600:400,
      fill:g.t==='mkt'?'var(--crit)':'var(--ink-1)'}));
    const lab=`${Rs(val)} · ${(Math.abs(val)/w.gross*100).toFixed(1)}%`;
    s.appendChild(txt(W-6, y+h-3, lab,
      {'text-anchor':'end','font-size':9.5,'font-family':'system-ui, sans-serif',
       'font-weight':g.t==='mkt'?700:(g.d===undefined?600:400),
       fill:g.t==='mkt'?'var(--crit)':(g.d===undefined?'var(--ink-1)':'var(--ink-2)')}));
    prevX=x(run);
  });
  s.appendChild(el('line',{x1:x(0),x2:x(0),y1:m.t,y2:m.t+st.length*rh,stroke:'var(--axis)','stroke-width':1.5}));
  // on-chart callout, below the tick row
  const cy=m.t+st.length*rh+42;
  s.appendChild(el('rect',{x:m.l,y:cy-9,width:9,height:9,rx:2,fill:'var(--crit)'}));
  s.appendChild(txt(m.l+14,cy,`Flips to loss at CM2 — marketing (${Rs(-w.mkt)}) alone exceeds CM1 (${Rs(w.cm1)}).`,
    {'font-size':10.5,'font-weight':600,fill:'var(--ink-1)'}));
  return s;
}

function chartFunnel(){
  const J=D.s5.jan.fun, A=D.s5.apr.fun;
  const rows=[{n:'Items viewed',k:'viewed'},{n:'Added to cart',k:'atc'},{n:'Purchased',k:'purch'}];
  const W=620, m={t:14,r:78,b:16,l:104}, sh=78;
  const H=m.t+m.b+rows.length*sh;
  const iw=W-m.l-m.r;
  const mx=Math.max(J.viewed,A.viewed)*1.02;
  const x=v=>v/mx*iw;
  const s=el('svg',{viewBox:`0 0 ${W} ${H}`,role:'img','aria-label':'Customer funnel: views to cart to purchase'});
  rows.forEach((r,i)=>{
    const y=m.t+i*sh;
    s.appendChild(txt(m.l-8,y+24,r.n,{'text-anchor':'end','font-size':11.5,'font-weight':600,fill:'var(--ink-1)'}));
    [['Jan–Mar',J,'var(--s1)',0],['Apr–Jun',A,'var(--s2)',22]].forEach(([nm,F,c,dy])=>{
      const v=F[r.k], bw=Math.max(x(v),1.5);
      const b=bar(m.l,y+dy,bw,18,4,'right'); b.setAttribute('fill',c);
      bind(b,`<b>${nm} · ${r.n}</b><div>${nf.format(v)}</div>
        <div>${(v/F.viewed*100).toFixed(2)}% of items viewed</div>`);
      s.appendChild(b);
      s.appendChild(txt(m.l+bw+6,y+dy+13,nf.format(v),{'font-size':10.5,'font-weight':600,fill:'var(--ink-1)'}));
    });
    if(i<rows.length-1){
      const nk=rows[i+1].k;
      const jr=J[nk]/J[r.k]*100, ar=A[nk]/A[r.k]*100;
      s.appendChild(txt(m.l,y+58,`↓ converts`,{'font-size':10,fill:'var(--ink-3)'}));
      s.appendChild(txt(m.l+58,y+58,`${jr.toFixed(2)}%`,{'font-size':10.5,'font-weight':700,fill:'var(--s1)'}));
      s.appendChild(txt(m.l+104,y+58,`→`,{'font-size':10.5,fill:'var(--ink-3)'}));
      s.appendChild(txt(m.l+120,y+58,`${ar.toFixed(2)}%`,{'font-size':10.5,'font-weight':700,fill:'var(--s2)'}));
      s.appendChild(txt(m.l+166,y+58,`(${ar<jr?'worse':'better'} by ${Math.abs(ar-jr).toFixed(2)}pp)`,
        {'font-size':10,'font-weight':600,fill:ar<jr?'var(--crit)':'var(--good)'}));
    }
  });
  return s;
}

/* GM% (x) vs EBITDA% (y), bubble = revenue — proves margin doesn't predict profit */
function chartGmVsEbitda(pk){
  const W=620,H=400,m={t:16,r:16,b:44,l:52};
  const iw=W-m.l-m.r, ih=H-m.t-m.b;
  const XD=[60,102], YD=[-260,60];
  const x=v=>m.l+(Math.max(XD[0],Math.min(XD[1],v))-XD[0])/(XD[1]-XD[0])*iw;
  const y=v=>m.t+ih-(Math.max(YD[0],Math.min(YD[1],v))-YD[0])/(YD[1]-YD[0])*ih;
  const ps=D.periods[pk].products;
  const rmax=Math.max(...ps.map(p=>p.rev)), rad=v=>4+Math.sqrt(v/rmax)*22;
  const s=el('svg',{viewBox:`0 0 ${W} ${H}`,role:'img','aria-label':'Gross margin % vs EBITDA % by product'});
  // profit/loss zones
  s.appendChild(el('rect',{x:m.l,y:y(0),width:iw,height:m.t+ih-y(0),fill:'var(--crit)','fill-opacity':.05}));
  s.appendChild(el('rect',{x:m.l,y:m.t,width:iw,height:y(0)-m.t,fill:'var(--good)','fill-opacity':.06}));
  for(const t of ticks(YD[0],YD[1],5)){
    s.appendChild(el('line',{x1:m.l,x2:m.l+iw,y1:y(t),y2:y(t),stroke:'var(--grid)','stroke-width':1}));
    s.appendChild(txt(m.l-8,y(t)+4,t+'%',{'text-anchor':'end',fill:'var(--ink-3)'}));
  }
  for(const t of [60,70,80,90,100])
    s.appendChild(txt(x(t),m.t+ih+18,t+'%',{'text-anchor':'middle',fill:'var(--ink-3)'}));
  s.appendChild(el('line',{x1:m.l,x2:m.l+iw,y1:y(0),y2:y(0),stroke:'var(--axis)','stroke-width':1.5}));
  s.appendChild(txt(m.l+iw/2,H-6,'Gross margin % of net revenue →',{'text-anchor':'middle','font-size':11.5,fill:'var(--ink-2)'}));
  s.appendChild(txt(-(m.t+ih/2),13,'← EBITDA % of net revenue',{'text-anchor':'middle','font-size':11.5,
    fill:'var(--ink-2)',transform:'rotate(-90)'}));
  s.appendChild(txt(m.l+6,y(0)-6,'PROFITABLE',{'font-size':10,'font-weight':600,fill:'var(--good)'}));
  s.appendChild(txt(m.l+6,y(0)+13,'LOSS-MAKING',{'font-size':10,'font-weight':600,fill:'var(--crit)'}));
  [...ps].sort((a,b)=>b.rev-a.rev).forEach(p=>{

/* Pareto — single axis (both series in %): bars = each SKU's share, line = cumulative */
function chartPareto(pk, metric){
  const cfg={rev:{f:p=>p.rev,all:true,lab:'revenue'},
             gm:{f:gmt,all:true,lab:'gross margin ₹'},
             loss:{f:p=>-p.ebitda_t,all:false,lab:'EBITDA loss'}}[metric];
  let ps=D.periods[pk].products.filter(p=>cfg.all||p.ebitda_t<0)
    .map(p=>({p,v:cfg.f(p)})).filter(x=>x.v>0).sort((a,b)=>b.v-a.v);
  const tot=ps.reduce((s,x)=>s+x.v,0); let cum=0;
  ps.forEach(x=>{x.share=x.v/tot*100; cum+=x.share; x.cum=cum;});
  const n20=Math.max(1,Math.round(ps.length*0.2)), share20=ps[n20-1].cum;
  const n80=ps.findIndex(x=>x.cum>=80)+1;
  const W=620,H=340,m={t:20,r:16,b:44,l:44};
  const iw=W-m.l-m.r, ih=H-m.t-m.b;
  const bw=iw/ps.length, x=i=>m.l+i*bw, y=v=>m.t+ih-v/100*ih;
  const s=el('svg',{viewBox:`0 0 ${W} ${H}`,role:'img','aria-label':`Pareto of ${cfg.lab}`});
  for(const t of [0,20,40,60,80,100]){
    s.appendChild(el('line',{x1:m.l,x2:m.l+iw,y1:y(t),y2:y(t),stroke:'var(--grid)','stroke-width':1}));
    s.appendChild(txt(m.l-8,y(t)+4,t+'%',{'text-anchor':'end',fill:'var(--ink-3)'}));
  }
  // 80% reference
  s.appendChild(el('line',{x1:m.l,x2:m.l+iw,y1:y(80),y2:y(80),stroke:'var(--warn)','stroke-width':1.5,'stroke-dasharray':'5 3'}));
  // bars (individual share)
  ps.forEach((d,i)=>{
    const h=ih-(y(d.share)-m.t);
    const b=bar(x(i)+0.5,y(d.share),Math.max(bw-1,1),h,Math.min(3,bw/2),'top');
    b.setAttribute('fill', metric==='loss'?'var(--neg)':'var(--s1)'); b.setAttribute('fill-opacity',.55);
    bind(b,`<b>${esc(d.p.key)}</b><div>Rank ${i+1} of ${ps.length}</div>
      <div>Share of ${cfg.lab}: ${d.share.toFixed(1)}%</div><div>Cumulative: ${d.cum.toFixed(1)}%</div>`);
    s.appendChild(b);
  });
  // cumulative line
  let path='M'+ps.map((d,i)=>`${(x(i)+bw/2).toFixed(1)},${y(d.cum).toFixed(1)}`).join(' L');
  s.appendChild(el('path',{d:path,fill:'none',stroke:'var(--s1)','stroke-width':2}));
  // 20%-of-SKUs marker
  const mx=x(n20);
  s.appendChild(el('line',{x1:mx,x2:mx,y1:m.t,y2:m.t+ih,stroke:'var(--ink-1)','stroke-width':1,'stroke-dasharray':'3 2'}));
  const dot=el('circle',{cx:(x(n20-1)+bw/2),cy:y(share20),r:4,fill:'var(--s1)',stroke:'var(--surface-1)','stroke-width':1.5});
  s.appendChild(dot);
  s.appendChild(txt(m.l+iw,y(85),'80% line',{'text-anchor':'end','font-size':9.5,'font-weight':600,fill:'#8a6100'}));
  s.appendChild(txt(m.l+iw/2,H-6,`products, ranked by ${cfg.lab} (highest first) →`,
    {'text-anchor':'middle','font-size':11,fill:'var(--ink-2)'}));
  // callout
  s.appendChild(txt(mx+6,m.t+14,`Top ${n20} SKUs (20%) = ${share20.toFixed(1)}% of ${cfg.lab}`,
    {'font-size':11,'font-weight':700,fill:'var(--ink-1)'}));
  s.appendChild(txt(mx+6,m.t+30,`80% reached by ${n80} SKUs (${(n80/ps.length*100).toFixed(0)}% of range)`,
    {'font-size':10.5,fill:'var(--ink-2)'}));
  return s;
}

/* Q3 — portfolio EBITDA-change decomposition (like-for-like, matched set) */
function chartDrivers(){
  const {J,A,both}=s6matched();
  let g=0,o=0,mk=0,h=0;
  both.forEach(k=>{const j=J[k],a=A[k],w=a.units;
    g+=(a.gm_u-j.gm_u)*w;
    o+=-(((a.gm_u-a.cm1_u))-((j.gm_u-j.cm1_u)))*w;
    mk+=-(a.mktg_u-j.mktg_u)*w;
    h+=-(a.oh_u-j.oh_u)*w;});
  const net=g+o+mk+h;
  const bars=[{n:'Gross margin',v:g,note:'stable ~82% margin'},
              {n:'Ops (pack/ship/pay/COD)',v:o,note:''},
              {n:'Marketing',v:mk,note:'the whole story'},
              {n:'Overhead',v:h,note:'allocation change, not a real saving'}];
  const W=620, rh=40, m={t:14,r:20,b:44,l:150};
  const H=m.t+m.b+(bars.length+1)*rh, iw=W-m.l-m.r;
  const mx=Math.max(...bars.map(b=>Math.abs(b.v)),Math.abs(net))*1.2;
  const x=v=>m.l+(v+mx)/(2*mx)*iw;
  const s=el('svg',{viewBox:`0 0 ${W} ${H}`,role:'img','aria-label':'EBITDA change decomposition'});
  for(const t of ticks(-mx,mx,4)){
    s.appendChild(el('line',{x1:x(t),x2:x(t),y1:m.t,y2:m.t+(bars.length+1)*rh,stroke:'var(--grid)','stroke-width':1}));
    s.appendChild(txt(x(t),H-12,Rs(t),{'text-anchor':'middle',fill:'var(--ink-3)','font-size':9.5}));
  }
  const drawBar=(r,i,bold)=>{
    const h=18, yy=m.t+i*rh+(rh-h)/2-3, v=r.v;
    const bx=Math.min(x(0),x(v)), bw=Math.abs(x(v)-x(0));
    const b=bar(bx,yy,Math.max(bw,1),h,4,v>=0?'right':'left');
    b.setAttribute('fill',bold?'var(--ink-1)':(v>=0?'var(--pos)':'var(--neg)'));
    bind(b,`<b>${r.n}</b><div>Effect on EBITDA: ${v>=0?'+':''}${R(v)}</div>${r.note?`<div>${r.note}</div>`:''}`);
    s.appendChild(b);
    // label + optional caveat stacked in the left gutter (caveat only where it earns its place)
    const ly = r.note && !bold ? yy+h-8 : yy+h-2;
    s.appendChild(txt(m.l-8,ly,r.n,{'text-anchor':'end','font-size':11,'font-weight':bold?700:400,fill:'var(--ink-1)'}));
    if(r.note && !bold) s.appendChild(txt(m.l-8,yy+h+8,r.note,{'text-anchor':'end','font-size':8.5,'font-style':'italic',fill:'var(--ink-3)'}));
    s.appendChild(txt(v>=0?bx+bw+5:bx-5,yy+h-2,(v>=0?'+':'')+Rs(v),
      {'text-anchor':v>=0?'start':'end','font-size':10,'font-weight':600,fill:bold?'var(--ink-1)':(v>=0?'var(--pos)':'var(--neg)')}));
  };
  bars.forEach((r,i)=>drawBar(r,i));
  s.appendChild(el('line',{x1:m.l,x2:m.l+iw,y1:m.t+bars.length*rh+2,y2:m.t+bars.length*rh+2,stroke:'var(--border)','stroke-width':1}));
  drawBar({n:'Net (like-for-like)',v:net,note:''},bars.length,true);
  s.appendChild(el('line',{x1:x(0),x2:x(0),y1:m.t,y2:m.t+(bars.length+1)*rh,stroke:'var(--axis)','stroke-width':1.5}));
  return s;
}

/* Q4 — unit change (x) vs EBITDA/unit (y); danger zone = grew a loss-maker */
function chartSalesBenefit(){
  const {J,A,both}=s6matched();
  const pts=both.map(k=>({key:J[k].key,du:A[k].units-J[k].units,ebu:A[k].ebitda_u,rev:A[k].rev,
    ju:J[k].units,au:A[k].units}));
  const W=620,H=380,m={t:16,r:16,b:46,l:60};
  const iw=W-m.l-m.r, ih=H-m.t-m.b;
  const XD=[-90,110], YD=[-1500,400];
  const x=v=>m.l+(Math.max(XD[0],Math.min(XD[1],v))-XD[0])/(XD[1]-XD[0])*iw;
  const y=v=>m.t+ih-(Math.max(YD[0],Math.min(YD[1],v))-YD[0])/(YD[1]-YD[0])*ih;
  const rmax=Math.max(...pts.map(p=>p.rev)), rad=v=>4+Math.sqrt(v/rmax)*20;
  const s=el('svg',{viewBox:`0 0 ${W} ${H}`,role:'img','aria-label':'Unit growth vs EBITDA per unit'});
  // danger quadrant: grew (x>0) AND loses money (y<0)
  s.appendChild(el('rect',{x:x(0),y:y(0),width:m.l+iw-x(0),height:m.t+ih-y(0),fill:'var(--crit)','fill-opacity':.08}));
  for(const t of ticks(YD[0],YD[1],5)){
    s.appendChild(el('line',{x1:m.l,x2:m.l+iw,y1:y(t),y2:y(t),stroke:'var(--grid)','stroke-width':1}));
    s.appendChild(txt(m.l-8,y(t)+4,Rs(t),{'text-anchor':'end',fill:'var(--ink-3)'}));
  }
  for(const t of ticks(XD[0],XD[1],5))
    s.appendChild(txt(x(t),m.t+ih+18,(t>0?'+':'')+t,{'text-anchor':'middle',fill:'var(--ink-3)'}));
  s.appendChild(el('line',{x1:x(0),x2:x(0),y1:m.t,y2:m.t+ih,stroke:'var(--axis)','stroke-width':1.5}));
  s.appendChild(el('line',{x1:m.l,x2:m.l+iw,y1:y(0),y2:y(0),stroke:'var(--axis)','stroke-width':1.5}));
  s.appendChild(txt(m.l+iw/2,H-6,'← sold fewer     unit change Jan–Mar → Apr–Jun     sold more →',
    {'text-anchor':'middle','font-size':11,fill:'var(--ink-2)'}));
  s.appendChild(txt(-(m.t+ih/2),14,'← EBITDA per unit',{'text-anchor':'middle','font-size':11.5,
    fill:'var(--ink-2)',transform:'rotate(-90)'}));
  s.appendChild(txt(m.l+iw-6,m.t+ih-6,'DANGER: grew a loss-maker',{'text-anchor':'end','font-size':10,'font-weight':600,fill:'var(--crit)'}));
  [...pts].sort((a,b)=>b.rev-a.rev).forEach(p=>{
    const off=p.du<XD[0]||p.du>XD[1]||p.ebu<YD[0]||p.ebu>YD[1];
    const danger=p.du>0 && p.ebu<0;
    const c=el('circle',{cx:x(p.du),cy:y(p.ebu),r:rad(p.rev),
      fill:danger?'var(--crit)':(p.ebu>=0?'var(--good)':'var(--ink-3)'),
      'fill-opacity':off?.3:.55,stroke:'var(--surface-1)','stroke-width':2});
    if(off) c.setAttribute('stroke-dasharray','3 2');
    bind(c,`<b>${esc(p.key)}</b><div>Units ${nf.format(p.ju)} → ${nf.format(p.au)} (${p.du>=0?'+':''}${nf.format(p.du)})</div>
      <div>EBITDA/unit ${R(p.ebu)}</div><div>Apr–Jun revenue ${R(p.rev)}</div>
      ${danger?'<div style="margin-top:4px;color:var(--crit);font-weight:600">Grew a loss-making product</div>':''}`);
    s.appendChild(c);
  });
  // label the biggest growers
  const placed=[];
  const fits=r=>!placed.some(q=>r.x<q.x+q.w&&q.x<r.x+r.w&&r.y<q.y+q.h&&q.y<r.y+r.h);
  [...pts].filter(p=>p.du>0).sort((a,b)=>b.du-a.du).slice(0,5).forEach(p=>{
    const w=p.key.length*6.4+6,h=14,cx=x(p.du),cy=y(p.ebu),rr=rad(p.rev);
    const spot=[{x:cx-w/2,y:cy-rr-4-h},{x:cx-w/2,y:cy+rr+4}].find(c=>fits({x:c.x,y:c.y,w,h}));
    if(!spot) return; placed.push({x:spot.x,y:spot.y,w,h});
    s.appendChild(txt(cx,spot.y+h-2,p.key,{'text-anchor':'middle','font-size':10,'font-weight':600,fill:'var(--ink-1)'}));
  });
  return s;
}

function renderS6(){

    dMkt+=-(a.mktg_u-j.mktg_u)*w; dOH+=-(a.oh_u-j.oh_u)*w;});

      <div class="s">Jan–Mar ${(TJ.gm/TJ.netrev*100).toFixed(1)}% — essentially unchanged</div></div>
    <div class="stat"><div class="v">${med(ga).toFixed(1)}%</div><div class="l">Median product GM%</div>
      <div class="s">half of products above, half below</div></div>
    <div class="stat"><div class="v">${ga[0].toFixed(1)}–${ga[ga.length-1].toFixed(0)}%</div><div class="l">Full GM% range</div>
      <div class="s">a tight ${(ga[ga.length-1]-ga[0]).toFixed(0)}-point band across ${ga.length} products</div></div>
    <div class="stat"><div class="v" style="color:var(--crit)">${P(TA.ebitdapct)}</div><div class="l">…yet EBITDA%</div>

/* grouped bars: CM2% & EBITDA% by period */
function chartA_pct(){
  const W=620,H=290,m={t:22,r:16,b:40,l:52}, iw=W-m.l-m.r, ih=H-m.t-m.b;
  const g=[{n:'CM2 %', j:AMZ.periods.jan.tot.cm2pct, a:AMZ.periods.apr.tot.cm2pct},
           {n:'EBITDA %', j:AMZ.periods.jan.tot.ebitdapct, a:AMZ.periods.apr.tot.ebitdapct}];
  const vals=g.flatMap(x=>[x.j,x.a]); const lo=Math.min(0,...vals)*1.15, hi=Math.max(0,...vals)*1.15;
  const y=v=>m.t+ih-(v-lo)/(hi-lo)*ih;
  const s=el('svg',{viewBox:`0 0 ${W} ${H}`,role:'img','aria-label':'CM2% and EBITDA% by period'});
  for(const t of ticks(lo,hi,5)){
    s.appendChild(el('line',{x1:m.l,x2:m.l+iw,y1:y(t),y2:y(t),stroke:'var(--grid)','stroke-width':1}));
    s.appendChild(txt(m.l-8,y(t)+4,t.toFixed(0)+'%',{'text-anchor':'end',fill:'var(--ink-3)'}));
  }
  s.appendChild(el('line',{x1:m.l,x2:m.l+iw,y1:y(0),y2:y(0),stroke:'var(--axis)','stroke-width':1.5}));
  const gw=iw/g.length;
  g.forEach((gg,i)=>{const cx=m.l+gw*i+gw/2, bw=52;
    [['Jan–Mar',gg.j,'var(--s1)',-1],['Apr–Jun',gg.a,'var(--s2)',1]].forEach(([nm,v,c,dir])=>{
      const bx=cx+(dir<0?-bw-2:2), top=Math.min(y(v),y(0)), h=Math.abs(y(v)-y(0));
      const b=bar(bx,top,bw,h,4,v>=0?'top':'bot'); b.setAttribute('fill',c);
      bind(b,`<b>${nm} · ${gg.n}</b><div>${v.toFixed(1)}% of net revenue</div>`); s.appendChild(b);
      s.appendChild(txt(bx+bw/2,(v>=0?top-6:top+h+14),v.toFixed(1)+'%',
        {'text-anchor':'middle','font-weight':600,'font-size':11.5,fill:'var(--ink-1)'}));
    });
    s.appendChild(txt(cx,H-14,gg.n,{'text-anchor':'middle','font-weight':600,'font-size':12.5,fill:'var(--ink-1)'}));
  });
  return s;
}

  s.appendChild(txt(m.l+iw/2,H-6,'CM2 % of net revenue →',{'text-anchor':'middle','font-size':11.5,fill:'var(--ink-2)'}));
  s.appendChild(txt(-(m.t+ih/2),13,'← EBITDA % of net revenue',{'text-anchor':'middle','font-size':11.5,fill:'var(--ink-2)',transform:'rotate(-90)'}));
  s.appendChild(txt(x0+8,m.t+14,'STARS  CM2+ / EBITDA+',{'font-size':10,'font-weight':600,fill:'var(--good)'}));

  s.appendChild(txt(m.l+6,m.t+ih-6,'LOSS-MAKING  CM2− / EBITDA−',{'font-size':10,'font-weight':600,fill:'var(--crit)'}));
  const placed=[], fits=r=>!placed.some(q=>r.x<q.x+q.w&&q.x<r.x+r.w&&r.y<q.y+q.h&&q.y<r.y+r.h);
  [...ps].sort((a,b)=>b.rev-a.rev).forEach(p=>{
    const cx=x(p.cm2pct), cy=y(p.ebitdapct);
    const off=p.cm2pct<ACLX[0]||p.cm2pct>ACLX[1]||p.ebitdapct<ACLY[0]||p.ebitdapct>ACLY[1];
    const c=el('circle',{cx,cy,r:rad(p.rev),fill:QC[p.quad],'fill-opacity':off?.30:.62,stroke:'var(--surface-1)','stroke-width':2});
    if(off) c.setAttribute('stroke-dasharray','3 2');
    bind(c,`<b>${esc(p.key)}</b><div>${esc(p.cat)} · ${nf.format(p.units)} units</div>
      <div>Revenue ${R(p.rev)}</div><div>CM2 ${P(p.cm2pct)} · ${R(p.cm2_t)}</div>
      <div>EBITDA ${P(p.ebitdapct)} · ${R(p.ebitda_t)}</div>
      <div style="margin-top:4px;color:${QC[p.quad]};font-weight:600">${QN[p.quad]}</div>
      ${off?'<div style="margin-top:4px">⚠ clamped to axis range</div>':''}`);
    s.appendChild(c);
  });
  [...ps].sort((a,b)=>b.rev-a.rev).slice(0,7).forEach(p=>{
    const cx=x(p.cm2pct),cy=y(p.ebitdapct),rr=rad(p.rev),w=p.key.length*6.4+6,h=14;
    const spot=[{x:cx-w/2,y:cy-rr-4-h},{x:cx-w/2,y:cy+rr+4}].find(c=>c.x>=m.l-4&&c.x+w<=m.l+iw+4&&c.y>=m.t&&c.y+h<=m.t+ih&&fits({x:c.x,y:c.y,w,h}));
    if(!spot) return; placed.push({x:spot.x,y:spot.y,w,h});
    s.appendChild(txt(cx,spot.y+h-2,p.key,{'text-anchor':'middle','font-size':10,'font-weight':600,fill:'var(--ink-1)'}));
  });
  return s;
}

/* Amazon cost cascade waterfall — Overheads is the emphasised (reddest) drop */
function wfStagesA(w){return [
  {n:'Gross Revenue',t:'total',v:w.gross},{n:'GST',t:'gst',d:w.gst},
  {n:'Refunds',t:'cost',d:w.refunds},{n:'Amazon Fees',t:'cost',d:w.amzfees},
  {n:'Net Revenue',t:'sub',v:w.netrev},{n:'COGS',t:'cost',d:w.cogs},
  {n:'Gross Margin',t:'sub',v:w.gm},{n:'Shipping',t:'cost',d:w.ship},
  {n:'CM1',t:'sub',v:w.cm1},{n:'Support Services',t:'cost',d:w.bss},
  {n:'Advertising',t:'cost',d:w.adv},{n:'E-vitamin',t:'cost',d:w.evit},
  {n:'CM2',t:'sub',v:w.cm2},{n:'Overheads',t:'oh',d:w.oh},{n:'EBITDA',t:'final',v:w.ebitda}];}
function chartA_waterfall(pk, dom){
  const w=AMZ.periods[pk].wf, st=wfStagesA(w);
  const W=620, rh=25, m={t:12,r:106,b:58,l:118}, iw=W-m.l-m.r, ih=st.length*rh;
  const H=m.t+m.b+ih, x=v=>m.l+(v-dom[0])/(dom[1]-dom[0])*iw;
  const s=el('svg',{viewBox:`0 0 ${W} ${H}`,role:'img','aria-label':`${AMZ.periods[pk].label} cost cascade`});
  for(const t of ticks(dom[0],dom[1],4)){
    s.appendChild(el('line',{x1:x(t),x2:x(t),y1:m.t,y2:m.t+ih,stroke:'var(--grid)','stroke-width':1}));
    s.appendChild(txt(x(t),m.t+ih+14,Rs(t),{'text-anchor':'middle',fill:'var(--ink-3)','font-size':9.5}));
  }
  let run=0, prevX=null;
  st.forEach((g,i)=>{const y=m.t+i*rh+3, h=rh-8; let a,b,fill,op=1,val;
    if(g.d===undefined){ a=0;b=g.v;run=g.v;val=g.v;
      fill=g.t==='final'?(g.v<0?'var(--neg)':'var(--pos)'):g.t==='total'?'var(--s1)':(g.v<0?'var(--neg)':'var(--s1)');
      if(g.t==='sub') op=.75;
    } else { a=run-g.d;b=run;run=run-g.d;val=-g.d;
      fill=g.t==='oh'?'var(--crit)':g.t==='gst'?'var(--ink-3)':'var(--neg)';
      op=g.t==='oh'?1:g.t==='gst'?.45:.5;
    }
    const bx=Math.min(x(a),x(b)), bw=Math.max(Math.abs(x(b)-x(a)),1.5);
    if(prevX!==null) s.appendChild(el('line',{x1:prevX,x2:prevX,y1:y-3,y2:y,stroke:'var(--axis)','stroke-width':1,'stroke-dasharray':'2 2'}));
    const bb=bar(bx,y,bw,h,4,val>=0?'right':'left'); bb.setAttribute('fill',fill); bb.setAttribute('fill-opacity',op);
    if(g.t==='oh'){bb.setAttribute('stroke','var(--crit)');bb.setAttribute('stroke-width',1.5);}
    bind(bb,`<b>${g.n}</b><div>${g.d===undefined?'Running total':'Deduction'}: ${R(val)}</div>
      <div>${(Math.abs(val)/w.gross*100).toFixed(1)}% of gross revenue</div>
      ${g.d!==undefined?`<div>Running total after: ${R(run)}</div>`:''}
      ${g.t==='gst'?'<div style="margin-top:4px">Pass-through to government — not a business leak</div>':''}`);
    s.appendChild(bb);
    s.appendChild(txt(m.l-8,y+h-3,g.n,{'text-anchor':'end','font-size':10.5,'font-weight':(g.d===undefined||g.t==='oh')?600:400,fill:g.t==='oh'?'var(--crit)':'var(--ink-1)'}));
    s.appendChild(txt(W-6,y+h-3,`${Rs(val)} · ${(Math.abs(val)/w.gross*100).toFixed(1)}%`,
      {'text-anchor':'end','font-size':9.5,'font-family':'system-ui, sans-serif','font-weight':g.t==='oh'?700:(g.d===undefined?600:400),fill:g.t==='oh'?'var(--crit)':(g.d===undefined?'var(--ink-1)':'var(--ink-2)')}));
    prevX=x(run);
  });
  s.appendChild(el('line',{x1:x(0),x2:x(0),y1:m.t,y2:m.t+ih,stroke:'var(--axis)','stroke-width':1.5}));
  const cy=m.t+ih+42;
  s.appendChild(el('rect',{x:m.l,y:cy-9,width:9,height:9,rx:2,fill:'var(--crit)'}));
  s.appendChild(txt(m.l+14,cy,`Profitable through CM2 (+${Rs(w.cm2)}) — overheads (${Rs(-w.oh)}) flip it to a loss.`,
    {'font-size':10.5,'font-weight':600,fill:'var(--ink-1)'}));
  return s;
}

/* single-axis Pareto (bars = share, line = cumulative) */
function chartA_pareto(pk, metric){
  const cfg={rev:{f:p=>p.rev,all:true,lab:'revenue'},gm:{f:p=>p.gm_t,all:true,lab:'gross margin ₹'},
             loss:{f:p=>-p.ebitda_t,all:false,lab:'EBITDA loss'}}[metric];
  let ps=AMZ.periods[pk].products.filter(p=>cfg.all||p.ebitda_t<0).map(p=>({p,v:cfg.f(p)})).filter(x=>x.v>0).sort((a,b)=>b.v-a.v);
  const tot=ps.reduce((s,x)=>s+x.v,0); let cum=0; ps.forEach(x=>{x.share=x.v/tot*100; cum+=x.share; x.cum=cum;});
  const n20=Math.max(1,Math.round(ps.length*0.2)), share20=ps[n20-1].cum, n80=ps.findIndex(x=>x.cum>=80)+1;
  const W=620,H=340,m={t:20,r:16,b:44,l:44}, iw=W-m.l-m.r, ih=H-m.t-m.b, bw=iw/ps.length;
  const x=i=>m.l+i*bw, y=v=>m.t+ih-v/100*ih;
  const s=el('svg',{viewBox:`0 0 ${W} ${H}`,role:'img','aria-label':`Pareto of ${cfg.lab}`});
  for(const t of [0,20,40,60,80,100]){
    s.appendChild(el('line',{x1:m.l,x2:m.l+iw,y1:y(t),y2:y(t),stroke:'var(--grid)','stroke-width':1}));
    s.appendChild(txt(m.l-8,y(t)+4,t+'%',{'text-anchor':'end',fill:'var(--ink-3)'}));
  }
  s.appendChild(el('line',{x1:m.l,x2:m.l+iw,y1:y(80),y2:y(80),stroke:'var(--warn)','stroke-width':1.5,'stroke-dasharray':'5 3'}));
  ps.forEach((d,i)=>{const h=ih-(y(d.share)-m.t);
    const b=bar(x(i)+0.5,y(d.share),Math.max(bw-1,1),h,Math.min(3,bw/2),'top');
    b.setAttribute('fill',metric==='loss'?'var(--neg)':'var(--s1)'); b.setAttribute('fill-opacity',.55);
    bind(b,`<b>${esc(d.p.key)}</b><div>Rank ${i+1} of ${ps.length}</div><div>Share of ${cfg.lab}: ${d.share.toFixed(1)}%</div><div>Cumulative: ${d.cum.toFixed(1)}%</div>`);
    s.appendChild(b);
  });
  s.appendChild(el('path',{d:'M'+ps.map((d,i)=>`${(x(i)+bw/2).toFixed(1)},${y(d.cum).toFixed(1)}`).join(' L'),fill:'none',stroke:'var(--s1)','stroke-width':2}));
  const mx=x(n20);
  s.appendChild(el('line',{x1:mx,x2:mx,y1:m.t,y2:m.t+ih,stroke:'var(--ink-1)','stroke-width':1,'stroke-dasharray':'3 2'}));
  s.appendChild(el('circle',{cx:(x(n20-1)+bw/2),cy:y(share20),r:4,fill:'var(--s1)',stroke:'var(--surface-1)','stroke-width':1.5}));
  s.appendChild(txt(m.l+iw,y(85),'80% line',{'text-anchor':'end','font-size':9.5,'font-weight':600,fill:'#8a6100'}));
  s.appendChild(txt(m.l+iw/2,H-6,`products, ranked by ${cfg.lab} (highest first) →`,{'text-anchor':'middle','font-size':11,fill:'var(--ink-2)'}));
  s.appendChild(txt(Math.min(mx+6,m.l+iw-220),m.t+14,`Top ${n20} SKUs (20%) = ${share20.toFixed(1)}% of ${cfg.lab}`,{'font-size':11,'font-weight':700,fill:'var(--ink-1)'}));
  s.appendChild(txt(Math.min(mx+6,m.l+iw-220),m.t+30,`80% reached by ${n80} SKUs (${(n80/ps.length*100).toFixed(0)}% of range)`,{'font-size':10.5,fill:'var(--ink-2)'}));
  return s;
}

/* category EBITDA% change diverging */
function chartA_catchg(){
  const CJ={},CA={};
  AMZ.periods.jan.cats.forEach(c=>CJ[c.cat]=c); AMZ.periods.apr.cats.forEach(c=>CA[c.cat]=c);
  const rows=Object.keys(CA).filter(c=>c in CJ && CA[c].rev>=15000).map(c=>({cat:c,jp:CJ[c].ebitdapct,ap:CA[c].ebitdapct,rev:CA[c].rev,d:CA[c].ebitdapct-CJ[c].ebitdapct})).sort((a,b)=>b.d-a.d);
  const W=620, rh=22, m={t:14,r:60,b:28,l:118}, iw=W-m.l-m.r, H=m.t+m.b+rows.length*rh;
  const mx=Math.max(...rows.map(r=>Math.abs(r.d)),1)*1.18, x=v=>m.l+(v+mx)/(2*mx)*iw;
  const s=el('svg',{viewBox:`0 0 ${W} ${H}`,role:'img','aria-label':'Category EBITDA% change'});
  for(const t of ticks(-mx,mx,4)){
    s.appendChild(el('line',{x1:x(t),x2:x(t),y1:m.t,y2:m.t+rows.length*rh,stroke:'var(--grid)','stroke-width':1}));
    s.appendChild(txt(x(t),H-12,(t>0?'+':'')+t.toFixed(0)+'pp',{'text-anchor':'middle',fill:'var(--ink-3)','font-size':9.5}));
  }
  rows.forEach((r,i)=>{const y=m.t+i*rh+3, h=rh-8, v=r.d, bx=Math.min(x(0),x(v)), bw=Math.abs(x(v)-x(0));
    const b=bar(bx,y,Math.max(bw,1),h,4,v>=0?'right':'left'); b.setAttribute('fill',v>=0?'var(--pos)':'var(--neg)');
    bind(b,`<b>${esc(r.cat)}</b><div>EBITDA% ${r.jp.toFixed(1)}% → ${r.ap.toFixed(1)}%</div><div>Change ${v>=0?'+':''}${v.toFixed(1)}pp</div><div>Apr–Jun revenue ${R(r.rev)}</div>`);
    s.appendChild(b);
    s.appendChild(txt(m.l-8,y+h-3,r.cat.length>17?r.cat.slice(0,16)+'…':r.cat,{'text-anchor':'end','font-size':10.5,fill:'var(--ink-1)'}));
    s.appendChild(txt(v>=0?bx+bw+4:bx-4,y+h-3,(v>=0?'+':'')+v.toFixed(0)+'pp',{'text-anchor':v>=0?'start':'end','font-size':9.5,'font-weight':600,fill:v>=0?'var(--pos)':'var(--neg)'}));
  });
  s.appendChild(el('line',{x1:x(0),x2:x(0),y1:m.t,y2:m.t+rows.length*rh,stroke:'var(--axis)','stroke-width':1.5}));
  return s;
}

/* =======================================================================
   CHANNEL COMPARISON — executive synthesis of Website (D) vs Amazon (AMZ).
   Reuses every shared primitive and CSS class. Latest quarter (Apr–Jun).
   ======================================================================= */
const MCAT={
  scale:   {t:'Scale Aggressively', c:'var(--good)'},
  protect: {t:'Protect',            c:'var(--s2)'},
  optimise:{t:'Optimise',           c:'var(--warn)'},
  fix:     {t:'Fix',                c:'var(--s1)'},
  exit:    {t:'Exit',               c:'var(--crit)'},
};
const cnorm=k=>String(k).replace(/\s+/g,' ').trim().toLowerCase();
function webSum(pk){const t=D.periods[pk].tot, ps=D.periods[pk].products;
  const cm1=ps.reduce((s,p)=>s+p.cm1_u*p.units,0);
  return {rev:t.rev,net:t.netrev,units:t.units,gm:t.gm,cm1,cm2:t.cm2,ebitda:t.ebitda,ad:t.mktg,oh:t.oh,n:t.n};}
function amzSum(pk){const t=AMZ.periods[pk].tot;
  return {rev:t.rev,net:t.netrev,units:t.units,gm:t.gm,cm1:t.cm1,cm2:t.cm2,ebitda:t.ebitda,ad:t.adv,oh:t.oh,n:t.n};}
const cpct=(x,b)=>x/b*100;
function cmpMatched(){
  const WP={},AP={};
  D.periods.apr.products.forEach(p=>{const k=cnorm(p.key); if(!WP[k])WP[k]=p;});
  AMZ.periods.apr.products.forEach(p=>{const k=cnorm(p.key); if(!AP[k])AP[k]=p;});
  const both=Object.keys(WP).filter(k=>k in AP);
  const mcat=(w,a)=> (w.cm2_u<0&&a.cm2_u<0)?'exit' : (a.ebitda_u>=0)?'scale'
    : (w.cm2_u>=0&&a.cm2_u>=0)?'protect' : (a.cm2_u>=0)?'optimise' : 'fix';
  const rows=both.map(k=>{const w=WP[k],a=AP[k];
    return {key:a.key,cat:a.cat,w,a,mcat:mcat(w,a),combRev:w.rev+a.rev,
            combEb:w.ebitda_t+a.ebitda_t,gap:a.ebitdapct-w.ebitdapct};});
  return {WP,AP,both,rows};
}

/* THE synthesis chart: margin cascade as % of net revenue, Website vs Amazon */
function chartCmp_cascade(){
  const W=webSum('apr'), A=amzSum('apr');
  const g=[{n:'Gross Margin',w:cpct(W.gm,W.net),a:cpct(A.gm,A.net)},
           {n:'CM1',w:cpct(W.cm1,W.net),a:cpct(A.cm1,A.net)},
           {n:'CM2 (contribution)',w:cpct(W.cm2,W.net),a:cpct(A.cm2,A.net)},
           {n:'EBITDA',w:cpct(W.ebitda,W.net),a:cpct(A.ebitda,A.net)}];
  const Wd=620,H=320,m={t:22,r:16,b:52,l:52}, iw=Wd-m.l-m.r, ih=H-m.t-m.b;
  const vals=g.flatMap(x=>[x.w,x.a]); const lo=Math.min(0,...vals)*1.12, hi=Math.max(...vals)*1.12;
  const y=v=>m.t+ih-(v-lo)/(hi-lo)*ih;
  const s=el('svg',{viewBox:`0 0 ${Wd} ${H}`,role:'img','aria-label':'Margin cascade Website vs Amazon'});
  for(const t of ticks(lo,hi,6)){
    s.appendChild(el('line',{x1:m.l,x2:m.l+iw,y1:y(t),y2:y(t),stroke:'var(--grid)','stroke-width':1}));
    s.appendChild(txt(m.l-8,y(t)+4,t.toFixed(0)+'%',{'text-anchor':'end',fill:'var(--ink-3)'}));
  }
  s.appendChild(el('line',{x1:m.l,x2:m.l+iw,y1:y(0),y2:y(0),stroke:'var(--axis)','stroke-width':1.5}));
  const gw=iw/g.length;
  g.forEach((gg,i)=>{const cx=m.l+gw*i+gw/2, bw=48;
    [['Website',gg.w,'var(--s1)',-1],['Amazon',gg.a,'var(--s2)',1]].forEach(([nm,v,c,dir])=>{
      const bx=cx+(dir<0?-bw-2:2), top=Math.min(y(v),y(0)), h=Math.abs(y(v)-y(0));
      const b=bar(bx,top,bw,h,4,v>=0?'top':'bot'); b.setAttribute('fill',c);
      bind(b,`<b>${nm} · ${gg.n}</b><div>${v.toFixed(1)}% of net revenue</div>`); s.appendChild(b);
      s.appendChild(txt(bx+bw/2,(v>=0?top-5:top+h+13),v.toFixed(0)+'%',
        {'text-anchor':'middle','font-weight':600,'font-size':11,fill:v>=0?'var(--ink-1)':'var(--crit)'}));
    });
    s.appendChild(txt(cx,H-30,gg.n,{'text-anchor':'middle','font-weight':600,'font-size':11.5,fill:'var(--ink-1)'}));
  });
  s.appendChild(txt(m.l,H-8,'Both channels are near-identical through CM1 — they diverge only at advertising (CM2).',
    {'font-size':10.5,'font-style':'italic',fill:'var(--ink-2)'}));
  return s;
}

/* cross-channel product scatter: X = Website EBITDA%, Y = Amazon EBITDA% */
function chartCmp_scatter(){
  const {rows}=cmpMatched();
  const Wd=620,H=430,m={t:16,r:16,b:46,l:56}, iw=Wd-m.l-m.r, ih=H-m.t-m.b;
  const XD=[-210,20], YD=[-90,45];
  const x=v=>m.l+(Math.max(XD[0],Math.min(XD[1],v))-XD[0])/(XD[1]-XD[0])*iw;
  const y=v=>m.t+ih-(Math.max(YD[0],Math.min(YD[1],v))-YD[0])/(YD[1]-YD[0])*ih;
  const rmax=Math.max(...rows.map(r=>r.combRev)), rad=v=>5+Math.sqrt(v/rmax)*22;
  const s=el('svg',{viewBox:`0 0 ${Wd} ${H}`,role:'img','aria-label':'Website vs Amazon EBITDA% by product'});
  const x0=x(0), y0=y(0);
  s.appendChild(el('rect',{x:m.l,y:m.t,width:x0-m.l,height:y0-m.t,fill:'var(--good)','fill-opacity':.07}));
  s.appendChild(el('rect',{x:m.l,y:y0,width:x0-m.l,height:m.t+ih-y0,fill:'var(--crit)','fill-opacity':.06}));
  for(const t of ticks(YD[0],YD[1],5)){
    s.appendChild(el('line',{x1:m.l,x2:m.l+iw,y1:y(t),y2:y(t),stroke:'var(--grid)','stroke-width':1}));
    s.appendChild(txt(m.l-8,y(t)+4,t+'%',{'text-anchor':'end',fill:'var(--ink-3)'}));
  }
  for(const t of ticks(XD[0],XD[1],5)) s.appendChild(txt(x(t),m.t+ih+18,t+'%',{'text-anchor':'middle',fill:'var(--ink-3)'}));
  s.appendChild(el('line',{x1:x0,x2:x0,y1:m.t,y2:m.t+ih,stroke:'var(--axis)','stroke-width':1.5}));
  s.appendChild(el('line',{x1:m.l,x2:m.l+iw,y1:y0,y2:y0,stroke:'var(--axis)','stroke-width':1.5}));
  s.appendChild(txt(m.l+iw/2,H-6,'← worse   Website EBITDA %   better →',{'text-anchor':'middle','font-size':11.5,fill:'var(--ink-2)'}));
  s.appendChild(txt(-(m.t+ih/2),14,'← Amazon EBITDA % →',{'text-anchor':'middle','font-size':11.5,fill:'var(--ink-2)',transform:'rotate(-90)'}));
  s.appendChild(txt(m.l+8,m.t+14,'AMAZON PROFITABLE · WEBSITE NOT',{'font-size':10,'font-weight':600,fill:'var(--good)'}));
  s.appendChild(txt(m.l+8,m.t+ih-8,'LOSS ON BOTH CHANNELS',{'font-size':10,'font-weight':600,fill:'var(--crit)'}));
  const placed=[], fits=r=>!placed.some(q=>r.x<q.x+q.w&&q.x<r.x+r.w&&r.y<q.y+q.h&&q.y<r.y+r.h);
  [...rows].sort((a,b)=>b.combRev-a.combRev).forEach(r=>{
    const off=r.w.ebitdapct<XD[0]||r.a.ebitdapct<YD[0]||r.a.ebitdapct>YD[1];
    const c=el('circle',{cx:x(r.w.ebitdapct),cy:y(r.a.ebitdapct),r:rad(r.combRev),fill:MCAT[r.mcat].c,
      'fill-opacity':off?.32:.6,stroke:'var(--surface-1)','stroke-width':2});
    if(off) c.setAttribute('stroke-dasharray','3 2');
    bind(c,`<b>${esc(r.key)}</b><div>${esc(r.cat)} · combined rev ${R(r.combRev)}</div>
      <div>Website EBITDA ${P(r.w.ebitdapct)} · ${R(r.w.ebitda_t)}</div>
      <div>Amazon EBITDA ${P(r.a.ebitdapct)} · ${R(r.a.ebitda_t)}</div>
      <div style="margin-top:4px;color:${MCAT[r.mcat].c};font-weight:600">${MCAT[r.mcat].t}</div>`);
    s.appendChild(c);
  });
  [...rows].sort((a,b)=>b.combRev-a.combRev).slice(0,7).forEach(r=>{
    const cx=x(r.w.ebitdapct),cy=y(r.a.ebitdapct),rr=rad(r.combRev),w=r.key.length*6.2+6,h=14;
    const spot=[{x:cx-w/2,y:cy-rr-4-h},{x:cx-w/2,y:cy+rr+4}].find(c=>c.x>=m.l&&c.x+w<=m.l+iw&&c.y>=m.t&&c.y+h<=m.t+ih&&fits({x:c.x,y:c.y,w,h}));
    if(!spot) return; placed.push({x:spot.x,y:spot.y,w,h});
    s.appendChild(txt(cx,spot.y+h-2,r.key,{'text-anchor':'middle','font-size':10,'font-weight':600,fill:'var(--ink-1)'}));
  });
  return s;
}

function renderCmp(){

  const webOnly=Object.keys(WP).filter(k=>!(k in AP)).map(k=>WP[k]).sort((a,b)=>b.rev-a.rev);

    `Of the <b>${both.length} products sold on both channels</b>, <b>${scaleP.length}</b> are EBITDA-positive on Amazon and <b>none</b> are on the website. Being profitable on Amazon does <b>not</b> justify website ad budget for the same SKU.`,
    `The website's two biggest bleeders — <b>${esc((WP['magic paint dust']||{}).key||'Magic Paint Dust')}</b> (${R((WP['magic paint dust']||{}).ebitda_t||0)}) and <b>Playdough</b> (${R((WP['playdough']||{}).ebitda_t||0)}) — are <b>profitable on Amazon</b>. Route the demand, don't fund it twice.`,
    `Combo products consistently outperform standalone SKUs: on Amazon, combos run positive EBITDA while single-SKU heroes sit in overhead-heavy. <b>${scaleP.filter(r=>/\+|,/.test(r.key)).length} of ${scaleP.length}</b> "Scale" products are combos.`,
    `Amazon is <b>${amzRevShare.toFixed(0)}% of combined revenue</b> (${R(combRev)}) but a much smaller share of the combined <b>${Rs(combEb)}</b> EBITDA loss — it is the efficient engine carrying the group.`,
    `<b>SFP</b> is the largest product across both channels (${R((WP['sfp']||{}).rev+(AP['sfp']||{}).rev)} combined) yet loses on both — CM2 <b>positive on Amazon (${(AP['sfp']||{}).cm2pct.toFixed(0)}%)</b> but sunk by overhead; <b>negative on the website</b>. It needs price/overhead work, not more ads.`,
    `<b>${exitP.length} shared products</b> (${exitP.map(r=>esc(r.key)).join(', ')||'—'}) are contribution-negative on <em>both</em> channels — they lose money before overhead everywhere and are delist candidates.`,
    `Trajectory diverges: Amazon EBITDA improved <b>${(cpct(A.ebitda,A.net)-cpct(Aj.ebitda,Aj.net)).toFixed(1)}pp</b> QoQ while the website deteriorated <b>${(cpct(W.ebitda,W.net)-cpct(Wj.ebitda,Wj.net)).toFixed(1)}pp</b>. Momentum favours Amazon.`,
  ];

  const invest=[
    ['var(--good)','Increase Amazon investment',`Amazon converts ad spend at <b>${aRoas.toFixed(2)}× ROAS</b> and books <b>${Rs(A.cm2)}</b> of contribution. Incremental units here are contribution-accretive. <b>Grow ad + inventory on the ${scaleP.length} Amazon-profitable SKUs</b> (${scaleP.slice(0,3).map(r=>esc(r.key)).join(', ')}…).`],
    ['var(--crit)','Fix — do not grow — Website acquisition',`At ROAS <b>${wRoas.toFixed(2)}×</b> and ad spend <b>${cpct(W.ad,W.net).toFixed(0)}% of net revenue</b>, every additional website order deepens the loss. <b>Cut / renegotiate website ad spend</b> before any growth; the ${cpct(W.gm,W.net).toFixed(0)}% gross margin is fine, the CAC is not.`],
    ['var(--warn)','Optimise overhead absorption (Amazon)',`<b>${optP.length} high-volume Amazon SKUs</b> (${optP.slice(0,3).map(r=>esc(r.key)).join(', ')}) are CM2-positive but sunk by the flat ₹${A.oh/A.units|0}/unit overhead. <b>Raise price or grow volume</b> to absorb it; interrogate whether that overhead belongs on Amazon.`],
    ['var(--s1)','Route website demand to Amazon',`For SKUs profitable on Amazon and loss-making on the website, <b>concentrate paid demand on Amazon</b> and keep the website listing organic. Saves the website ad ₹ while retaining the sale on the efficient channel.`],
    ['var(--s2)','Bundle & raise basket',`Combos out-earn standalone SKUs on both channels. <b>Push combo bundles</b> to spread fixed overhead over more revenue — the clearest lever on Amazon's overhead gap and the website's contribution gap.`],
    ['var(--crit)','Reduce discounting / delist the exits',`<b>${exitP.map(r=>esc(r.key)).join(', ')||'The both-negative SKUs'}</b> lose contribution on both channels. <b>Reprice or delist</b>; stop funding negative-contribution volume anywhere.`],
  ];

  // matrix members incl. Fix (website-only deep losses) & amazon-only
  const fixList=webOnlyDeep.map(p=>({key:p.key,cat:p.cat,ch:'Website-only',w:p,a:null,mcat:'fix',
    note:`Website ${P(p.ebitdapct)} · no Amazon presence`}));
  const scaleExtra=amzStar.map(p=>({key:p.key,cat:p.cat,ch:'Amazon-only',w:null,a:p,mcat:'scale',
    note:`Amazon ${P(p.ebitdapct)} · Amazon-only`}));
  const matrixRows=[...rows.map(r=>({...r,ch:'Both',note:''})), ...scaleExtra, ...fixList];
  const order=['scale','protect','optimise','fix','exit'];
  matrixRows.sort((a,b)=>order.indexOf(a.mcat)-order.indexOf(b.mcat) || (b.combRev||b.w&&b.w.rev||b.a&&b.a.rev||0)-(a.combRev||a.w&&a.w.rev||a.a&&a.a.rev||0));

  const actions=[
    {sev:'crit',ic:'crit',lab:'Priority · critical',h:'Stop scaling the website — cut acquisition spend now',
     b:`Website ROAS is <b>${wRoas.toFixed(2)}×</b> with ad spend at <b>${cpct(W.ad,W.net).toFixed(0)}%</b> of net revenue; CM2 is <b>${cpct(W.cm2,W.net).toFixed(1)}%</b> and it worsened QoQ. It loses <b>${Rs(W.ebitda)}</b> at EBITDA.`,
     a:`Cut or renegotiate website ad spend immediately; hold all website growth budget until CM2 turns positive. No pricing or product change is needed first — the ${cpct(W.gm,W.net).toFixed(0)}% gross margin is healthy.`},
    {sev:'good',ic:'good',lab:'Priority · high · opportunity',h:'Shift growth budget to Amazon',
     b:`Amazon books <b>${Rs(A.cm2)}</b> contribution at <b>${aRoas.toFixed(2)}× ROAS</b> and improved QoQ. <b>${scaleP.length}</b> shared SKUs are EBITDA-positive there.`,
     named:scaleP.slice(0,6).map(r=>`${r.key} · Amz ${P(r.a.ebitdapct)}`),
     a:`Redirect the website acquisition budget into Amazon ads + inventory on the ${scaleP.length} profitable SKUs. Incremental Amazon units are contribution-positive; incremental website units are not.`},
    {sev:'warn',ic:'warn',lab:'Priority · high',h:'Attack Amazon\'s overhead on the high-volume SKUs',
     b:`<b>${optP.length}</b> Amazon SKUs are CM2-positive but EBITDA-negative purely from the flat ₹${A.oh/A.units|0}/unit overhead — led by <b>${optP[0]?esc(optP[0].key):'SFP'}</b> (${optP[0]?R(optP[0].a.ebitda_t):''}).`,
     named:optP.slice(0,6).map(r=>`${r.key} · CM2 ${r.a.cm2pct.toFixed(0)}%`),
     a:`Raise price or grow volume on these to absorb overhead, and challenge whether ₹${A.oh/A.units|0}/unit belongs on Amazon. Do not cut their ads — contribution is already positive.`},
    {sev:'s1',ic:'info',lab:'Priority · medium',h:'Route dual-channel demand to the efficient channel',
     b:`Products like <b>Magic Paint Dust</b> and <b>Playdough</b> lose ${R((WP['magic paint dust']||{}).ebitda_t||0)} / ${R((WP['playdough']||{}).ebitda_t||0)} on the website but are profitable on Amazon.`,
     a:`Keep website listings organic and concentrate paid demand on Amazon for every SKU that is Amazon-profitable and website-negative. Stop paying to acquire the same customer twice.`},
    {sev:'crit',ic:'crit',lab:'Priority · medium',h:'Delist the both-channel losers',
     b:`<b>${exitP.map(r=>esc(r.key)).join(', ')||'—'}</b> are contribution-negative on both channels — they lose money before overhead everywhere.`,
     a:`Reprice hard or delist. Also review the ${fixList.length} website-only structural losers (${fixList.slice(0,3).map(r=>esc(r.key)).join(', ')}) for a price fix or exit.`},
    {sev:'s2',ic:'good',lab:'Priority · opportunity',h:'Bundle to spread overhead & lift contribution',
     b:`Combos out-earn standalone SKUs on both channels; <b>${scaleP.filter(r=>/\+|,/.test(r.key)).length}</b> of the Amazon "Scale" set are combos.`,
     a:`Expand combo bundles and reduce standalone discounting. Higher basket value is the shared lever on both Amazon's overhead gap and the website's contribution gap.`},
  ];
  const CC={crit:'var(--crit)',warn:'var(--warn)',good:'var(--good)',s1:'var(--s1)',s2:'var(--s2)'};
  const IC={crit:ICONS.crit,warn:ICONS.warn,good:ICONS.good,info:ICONS.info};

  document.getElementById('cmp').innerHTML=`
  <h2 style="margin-top:8px">1 · Executive verdict</h2>
  <p class="lede">Across the two channels the group lost <b>${Rs(combEb)}</b> of EBITDA on <b>${R(combRev)}</b> of revenue
    last quarter. But the two channels fail for <b>opposite reasons</b>, and only one of them is fixable by growth.</p>
  <div class="qa" style="--qac:var(--good)">
    <h3>Amazon has the healthier economics and the momentum — invest there. The website has a fixable acquisition problem — fix it before growing it.</h3>
    <div class="ans">
      <p><b>Healthier channel:</b> Amazon. Identical gross margin (${cpct(A.gm,A.net).toFixed(0)}% vs ${cpct(W.gm,W.net).toFixed(0)}%) but CM2
        <b>+${cpct(A.cm2,A.net).toFixed(1)}%</b> vs the website's <b>${cpct(W.cm2,W.net).toFixed(1)}%</b>, because Amazon advertising returns
        <b>${aRoas.toFixed(2)}×</b> against the website's <b>${wRoas.toFixed(2)}×</b>.</p>
      <p><b>Improved QoQ:</b> Amazon (EBITDA ${cpct(Aj.ebitda,Aj.net).toFixed(0)}% → ${cpct(A.ebitda,A.net).toFixed(0)}%). <b>Deteriorated QoQ:</b> Website
        (${cpct(Wj.ebitda,Wj.net).toFixed(0)}% → ${cpct(W.ebitda,W.net).toFixed(0)}%). <b>Deserves investment:</b> Amazon.
        <b>Needs operational fix:</b> Website acquisition. <b>Marketing-optimisation priority:</b> Website — ad spend is
        <b>${cpct(W.ad,W.net).toFixed(0)}%</b> of net revenue.</p>
    </div>
  </div>

  <h2>2 · Headline comparison</h2>
  <p class="note">Latest quarter (Apr–Jun). “Winner” is the channel with the stronger figure; interpretation is the executive read.</p>
  <div class="tw"><table>
    <thead><tr><th>Metric</th><th>Website</th><th>Amazon</th><th>Winner</th><th style="text-align:left">Executive interpretation</th></tr></thead>
    <tbody>${metrics.map(([lab,w,a,winner,interp])=>`<tr>
      <td><b>${lab}</b></td><td class="n">${w}</td><td class="n">${a}</td>
      <td style="text-align:left"><span class="tag" style="--tc:${WC[winner]}">${WT[winner]}</span></td>
      <td class="muted" style="text-align:left;white-space:normal">${interp}</td></tr>`).join('')}</tbody></table></div>

  <h2>3 · Profitability comparison — where each channel loses money</h2>
  <p class="note">Every line as a % of net revenue. The two channels are <b>near-identical through CM1</b>; the website
    collapses at <b>CM2 (advertising)</b>, Amazon only at <b>EBITDA (overhead)</b>.</p>
  <div class="lg"><span><i style="background:var(--s1)"></i>Website</span><span><i style="background:var(--s2)"></i>Amazon</span></div>
  <div class="chart" id="cmp-casc"></div>

  <h2>4 · Channel strengths &amp; weaknesses</h2>
  <div class="two-probs">
    ${strengths.map(([c,h,b])=>`<div class="prob" style="--pc:${c}"><h4>${h}</h4><p>${b}</p></div>`).join('')}
  </div>

  <h2>5 · Product comparison across channels</h2>
  <p class="note">${both.length} products sell on both channels. X = website EBITDA %, Y = Amazon EBITDA %, bubble = combined
    revenue. Almost everything sits in the <b style="color:var(--good)">top-left</b> — profitable on Amazon, loss-making on the website.</p>
  <div class="chart" id="cmp-sc"></div>
  <div class="stats" style="margin-top:12px">
    <div class="stat"><div class="v" style="color:var(--good)">${scaleP.length}</div><div class="l">Profitable on Amazon only</div><div class="s">EBITDA+ on Amazon, negative on website</div></div>
    <div class="stat"><div class="v">0</div><div class="l">Profitable on website only</div><div class="s">no shared SKU is website-EBITDA-positive</div></div>
    <div class="stat"><div class="v" style="color:var(--crit)">${exitP.length}</div><div class="l">Loss-making on both</div><div class="s">${exitP.map(r=>esc(r.key)).join(', ')||'—'}</div></div>
    <div class="stat"><div class="v" style="color:var(--warn)">${optP.length}</div><div class="l">Amazon-viable, overhead-sunk</div><div class="s">CM2+ but EBITDA− on Amazon</div></div>
  </div>
  <div class="prob" style="--pc:var(--s1);margin-top:12px"><h4>Recommendation</h4>
    <p>The cross-channel verdict is unambiguous: <b>the same products make money on Amazon and lose it on the website</b>,
      and the delta is entirely advertising efficiency. Concentrate paid demand for shared SKUs on Amazon; keep the website
      listing organic; and treat the ${exitP.length} both-negative SKUs as delist candidates.</p></div>

  <h2>6 · Investment opportunities</h2>
  <p class="note">Each recommendation traces to a workbook figure.</p>
  <div class="acts">
    ${invest.map(([c,h,b])=>`<div class="act" style="--ac:${c}"><div class="act-h"><h3>${h}</h3></div>
      <div class="act-b">${b}</div></div>`).join('')}
  </div>

  <h2>7 · Executive decision matrix</h2>
  <p class="note">Every important product placed into one action using <b>both</b> channels' performance. Shared products use
    the cross-channel read; single-channel products are flagged.</p>
  <div class="lg">${order.map(k=>`<span><i style="background:${MCAT[k].c}"></i>${MCAT[k].t}</span>`).join('')}</div>
  <div class="tw"><table>
    <thead><tr><th>Action</th><th>Product</th><th>Channel</th><th>Website EBITDA%</th><th>Amazon EBITDA%</th><th>Combined rev</th><th style="text-align:left">Rationale</th></tr></thead>
    <tbody>${matrixRows.map(r=>{
      const rat={scale:'EBITDA-positive on Amazon — pour budget here',
        protect:'Contribution-positive on both — defend',
        optimise:'Amazon CM2+ but overhead-sunk — grow/price to absorb',
        fix:'Deep website loss, no efficient channel — reprice or exit',
        exit:'Contribution-negative on both — delist'}[r.mcat];
      return `<tr><td style="text-align:left"><span class="tag" style="--tc:${MCAT[r.mcat].c}">${MCAT[r.mcat].t}</span></td>
        <td><b>${esc(r.key)}</b></td><td class="muted">${r.ch}</td>
        <td class="n">${r.w?P(r.w.ebitdapct):'—'}</td><td class="n">${r.a?P(r.a.ebitdapct):'—'}</td>
        <td class="n">${R(r.combRev||(r.w&&r.w.rev)||(r.a&&r.a.rev)||0)}</td>
        <td class="muted" style="text-align:left;white-space:normal">${rat}</td></tr>`;}).join('')}</tbody></table></div>

  <h2>8 · Top executive insights</h2>
  ${insights.map((t,i)=>`<div class="tk" style="--tkc:${i<3?'var(--crit)':i<6?'var(--s1)':'var(--s2)'}"><p style="font-size:13.5px">${t}</p></div>`).join('')}

  <h2>9 · Recommended actions</h2>
  <p class="note">Prioritised, each tied to measurable evidence.</p>
  <div class="acts">
    ${actions.map(c=>`<div class="act" style="--ac:${CC[c.sev]}">
      <div class="act-h"><div class="act-sev">${IC[c.ic]}${c.lab}</div><h3>${c.h}</h3></div>
      <div class="act-b">${c.b}${c.named?`<div class="named">${c.named.map(n=>`<code>${esc(n)}</code>`).join('')}</div>`:''}</div>
      <div class="act-do"><span>Recommended action</span><p>${c.a}</p></div></div>`).join('')}
  </div>
  <div class="card" style="margin-top:14px"><p class="note" style="max-width:none;margin:0"><b>Method.</b> Synthesised from the
    reconciled Website and Amazon models, latest quarter (Apr–Jun) with Jan–Mar trend. Channels joined on the shared short
    product key (${both.length} matched). Website advertising = measured per-SKU marketing; Amazon = Cost of Advertising.
    ROAS = gross revenue ÷ advertising. Every figure traces to the two workbooks.</p></div>`;

  document.getElementById('cmp-casc').appendChild(chartCmp_cascade());
  document.getElementById('cmp-sc').appendChild(chartCmp_scatter());
}

/* ---------- tabs & channels ---------- */
const done={};
const renderers={act:renderAct,s1:renderS1,s2:renderS2,s3:renderS3,s4:renderS4,s5:renderS5,s6:renderS6,
  am_act:renderA_act,am_s1:renderA_s1,am_s2:renderA_s2,am_s3:renderA_s3,am_s4:renderA_s4,am_s5:renderA_s5,am_s6:renderA_s6,
  cmp:renderCmp};
const CHAN={
  web:{nav:'nav-web', first:'act', title:'Website Unit Economics — Jan–Jun 2026',
       sub:'Product-level profitability across two quarters, plus a comparison of the two costing methodologies. All figures ₹.'},
  amz:{nav:'nav-amz', first:'am_act', title:'Amazon Unit Economics — Jan–Jun 2026',
       sub:'Marketplace profitability across two quarters — per-ASIN CM1 / CM2 / EBITDA, advertising efficiency, and the overhead-absorption gap. All figures ₹.'},
  cmp:{nav:null, first:'cmp', title:'Channel Comparison — the investment decision',
       sub:'Website vs Amazon synthesised into one board-review page. Where to invest, where to optimise, where to cut. Latest quarter (Apr–Jun) with trend. All figures ₹.'}
};
let curChan='web';
function show(id){
  document.querySelectorAll('nav button').forEach(b=>b.setAttribute('aria-selected', b.dataset.tab===id));
  document.querySelectorAll('section[role="tabpanel"]').forEach(s=>s.hidden = s.id!==id);
  if(!done[id]){ renderers[id](); done[id]=true; }
  scrollTo({top:0});
}
function setChannel(ch){
  if(ch===curChan) return; curChan=ch; const c=CHAN[ch];
  document.querySelectorAll('#chan-seg button').forEach(b=>b.setAttribute('aria-pressed', b.dataset.chan===ch));
  document.getElementById('nav-web').hidden = ch!=='web';
  document.getElementById('nav-amz').hidden = ch!=='amz';
  document.getElementById('dash-title').textContent=c.title;
  document.getElementById('dash-sub').textContent=c.sub;
  show(c.first);
}
document.querySelector('.top-in').addEventListener('click',e=>{
  const t=e.target.closest('button[data-tab]'); if(t){ show(t.dataset.tab); return; }
  const c=e.target.closest('button[data-chan]'); if(c) setChannel(c.dataset.chan);
});
show('act');
</script>

</body>
</html>
